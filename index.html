
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#161513">
<title>Stopwatch Video Pro</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/fix-webm-duration@1.0.6/fix-webm-duration.js"></script>
<style>
  :root{
    --track-red:#c1272d;
    --ink:#161513;
    --paper:#f4f1ea;
    --mono: ui-monospace, 'SF Mono', 'Roboto Mono', Menlo, Monaco, Consolas, monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;
    width:100%;height:100%;
    background:#000;
    overflow:hidden;
    font-family:var(--mono);
    color:var(--paper);
    user-select: none; /* Prevents random red/text highlights when clicking rapidly */
    -webkit-user-select: none;
  }
  #stage{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
    background:#000;
  }
  video{display:none;}
  canvas{
    max-width:100%;max-height:100%;
    width:auto;height:auto;
    display:block;
  }

  #permOverlay{
    position:fixed;inset:0;
    background:var(--ink);
    color:var(--paper);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:32px;
    z-index:50;
  }
  #permOverlay h1{font-size:20px;margin:0 0 12px;}
  #permOverlay p{font-size:14px;line-height:1.6;color:#c9c4b8;max-width:44ch;margin:0 0 20px;}
  #permOverlay button{
    font-family:var(--mono);
    font-size:14px;letter-spacing:.05em;text-transform:uppercase;
    background:var(--track-red);color:var(--paper);
    border:none;border-radius:6px;
    padding:14px 26px;
    cursor:pointer;
  }
  #permOverlay.hidden{display:none;}

  #topBar{
    position:fixed;top:0;left:0;right:0;
    display:flex;justify-content:space-between;align-items:center;
    padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
    background:linear-gradient(rgba(0,0,0,.55),transparent);
    z-index:20;
  }
  .iconBtn{
    width:44px;height:44px;
    border-radius:50%;
    border:none;
    background:rgba(0,0,0,.35);
    color:var(--paper);
    font-size:20px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .iconBtn:active{background:rgba(193,39,45,.6);}

  #badgeContainer{
    display:flex;
    align-items:center;
    gap:6px;
  }
  #recBadge{
    font-size:12px;letter-spacing:.08em;
    padding:6px 12px;border-radius:20px;
    background:rgba(0,0,0,.4);
    display:flex;align-items:center;gap:6px;
    visibility:hidden;
  }
  #recBadge.live{visibility:visible;}
  #recDot{width:9px;height:9px;border-radius:50%;background:var(--track-red);}
  #recBadge.paused #recDot{background:#c9a227;}
  #recDot.blink{animation:blink 1s infinite;}
  @keyframes blink{50%{opacity:.25;}}

  #audioBadge{
    font-size:11px;
    padding:6px 10px;
    border-radius:20px;
    background:rgba(0,0,0,0.4);
    display:flex;align-items:center;gap:4px;
    border:1px solid rgba(244,241,234,0.15);
  }
  #audioMeter{
    width:8px;height:8px;border-radius:50%;background:#2f9e44;
    transition:transform 0.05s ease, background 0.1s ease;
  }

  #bottomBar{
    position:fixed;bottom:0;left:0;right:0;
    display:flex;flex-direction:column;align-items:center;gap:14px;
    padding:14px 18px calc(20px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent,rgba(0,0,0,.6));
    z-index:20;
  }
  #clockRow{
    display:flex;align-items:center;gap:10px;justify-content:center;flex-wrap:wrap;
  }
  .pillBtn{
    font-family:var(--mono);
    font-size:13px;letter-spacing:.05em;text-transform:uppercase;
    border:1px solid rgba(244,241,234,.4);
    background:rgba(0,0,0,.35);
    color:var(--paper);
    border-radius:24px;
    padding:10px 18px;
    cursor:pointer;
  }
  .pillBtn.active{background:var(--track-red);border-color:var(--track-red);}
  .pillBtn:disabled{opacity:.35;}
  
  #audioArmBtn.armed {
    animation: pulseArmed 1.5s infinite;
  }
  @keyframes pulseArmed {
    50% { opacity: 0.7; }
  }

  .smallBtn{
    width:40px;height:40px;border-radius:50%;
    border:1px solid rgba(244,241,234,.4);
    background:rgba(0,0,0,.35);
    color:var(--paper);
    font-size:15px;
    cursor:pointer;
  }
  .smallBtn:disabled{opacity:.3;}

  #recRow{
    display:flex;align-items:center;gap:26px;
  }
  #recMainBtn{
    width:76px;height:76px;border-radius:50%;
    border:4px solid var(--paper);
    background:var(--track-red);
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    padding:0;
  }
  #recMainBtn #recIcon{
    font-size:22px;
    line-height:1;
    color:var(--paper);
  }
  #recMainBtn.state-paused{background:#c9a227;}
  #recMainBtn.state-recording #recIcon{color:var(--track-red);}
  #recMainBtn.state-recording{background:var(--paper);}
  #finishBtn{
    font-family:var(--mono);
    font-size:12px;letter-spacing:.05em;text-transform:uppercase;
    width:56px;height:56px;border-radius:50%;
    border:1px solid rgba(244,241,234,.4);
    background:rgba(0,0,0,.35);
    color:var(--paper);
    cursor:pointer;
  }
  #finishBtn:disabled{opacity:.3;}
  #finishBtn.ready{background:#2f9e44;border-color:#2f9e44;}

  #resultOverlay{
    position:fixed;inset:0;
    background:var(--ink);
    display:none;
    flex-direction:column;
    z-index:40;
    overflow-y:auto;
  }
  #resultOverlay.show{display:flex;}
  #resultVideoWrap{
    position:relative;
    width:100%;
    height:45vh;
    background:#000;
    overflow:hidden;
    flex-shrink:0;
    cursor: pointer;
  }
  #resultVideoWrap video{
    display:block;
    width:100%;height:100%;
    object-fit:contain;
    pointer-events: none; /* Let track/swipes fall cleanly to container script */
  }
  #bigPlayBtn{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:76px;height:76px;
    border-radius:50%;
    background:rgba(0,0,0,.65);
    color:var(--paper);
    display:flex;align-items:center;justify-content:center;
    font-size:28px;
    padding-left:6px;
    pointer-events:none; /* Clicks bypass the graphic entirely */
    transition:opacity .15s ease, transform 0.1s ease;
  }
  #bigPlayBtn.hidden{opacity:0; transform: translate(-50%, -50%) scale(0.85); pointer-events: none;}

  #frameStepBar{
    padding:8px 14px;
    display:flex;gap:6px;justify-content:center;flex-wrap:wrap;
    background:var(--ink);
    border-bottom:1px solid #2c2a27;
  }
  .frameBtn{
    font-family:var(--mono);
    font-size:11px;
    background:transparent;
    color:var(--paper);
    border:1px solid rgba(244,241,234,.3);
    border-radius:16px;
    padding:6px 12px;
    cursor:pointer;
  }
  .frameBtn:active, .frameBtn.activeSpeed{background:var(--track-red);border-color:var(--track-red);}

  #resultsDataContainer {
    flex:1;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:12px;
    background:#1c1b18;
  }
  #markingRow {
    display:flex;
    gap:8px;
    justify-content:center;
    flex-wrap:wrap;
  }
  #markFinisherBtn {
    flex:2;
    min-width:140px;
    background:#2f9e44;
    color:#fff;
    border:none;
    font-family:var(--mono);
    font-size:14px;
    font-weight:bold;
    text-transform:uppercase;
    padding:12px;
    border-radius:6px;
    cursor:pointer;
  }
  #markFinisherBtn:active { background:#247a35; }
  
  .syncActionBtn {
    flex:1;
    background:rgba(0,0,0,0.4);
    color:var(--paper);
    border:1px solid rgba(244,241,234,.4);
    font-family:var(--mono);
    font-size:12px;
    padding:12px 10px;
    border-radius:6px;
    cursor:pointer;
  }
  #flashZeroBtn { background:#1098ad; border-color:#1098ad; color:#fff; }

  #tableWrapper {
    flex:1;
    max-height:180px;
    overflow-y:auto;
    border:1px solid #383530;
    border-radius:6px;
    background:var(--ink);
  }
  table {
    width:100%;
    border-collapse:collapse;
    font-size:13px;
    text-align:left;
  }
  th, td {
    padding:8px 12px;
    border-bottom:1px solid #2c2a27;
  }
  th { background:#22211e; color:#c9c4b8; font-weight:normal; }
  .deleteRowBtn {
    background:transparent;
    color:var(--track-red);
    border:none;
    cursor:pointer;
    font-size:14px;
    padding:0 4px;
  }

  #resultBar{
    padding:10px 14px calc(14px + env(safe-area-inset-bottom));
    display:flex;gap:8px;flex-wrap:wrap;
    justify-content:center;
    background:var(--ink);
    border-top:1px solid #2c2a27;
  }
  #resultBar button{
    font-family:var(--mono);
    font-size:12px;letter-spacing:.03em;text-transform:uppercase;
    border:none;border-radius:6px;
    padding:10px 14px;
    cursor:pointer;
  }
  #exportCsvBtn{background:#1c7ed6;color:#fff;}
  #shareBtn{background:var(--track-red);color:var(--paper);}
  #downloadBtn{background:var(--paper);color:var(--ink);}
  #discardBtn{background:transparent;color:#c9c4b8;border:1px solid #4a4640 !important;}

  #zoomIndicator{
    position:fixed;top:50%;left:50%;
    transform:translate(-50%,-50%);
    font-family:var(--mono);font-weight:700;font-size:22px;
    background:rgba(0,0,0,.5);color:var(--paper);
    padding:10px 18px;border-radius:14px;
    z-index:30;opacity:0;pointer-events:none;
    transition:opacity .15s ease;
  }
  #zoomIndicator.show{opacity:1;}
  #installBtn{
    position:fixed;top:calc(10px + env(safe-area-inset-top));left:50%;
    transform:translateX(-50%);display:none;
    font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;
    background:var(--track-red);color:var(--paper);
    border:none;border-radius:20px;padding:8px 16px;z-index:25;
  }
  #versionTag{
    position:fixed;bottom:calc(4px + env(safe-area-inset-bottom));right:6px;
    font-family:var(--mono);font-size:9px;color:rgba(244,241,234,.35);
    z-index:15;pointer-events:none;
  }
  #importBtnRow {
    position:absolute;top:calc(12px + env(safe-area-inset-top));left:14px;z-index:25;
  }
</style>
</head>
<body>

<div id="stage">
  <video id="video" playsinline muted autoplay></video>
  <canvas id="canvas"></canvas>
</div>

<button id="installBtn">Install app</button>

<div id="permOverlay">
  <h1>Stopwatch Video Pro</h1>
  <p>Needs access to your camera and microphone to track run splits and identify starting audio cues automatically.</p>
  <button id="permBtn">Enable camera</button>
  <p id="permError" style="color:#e78a8e;margin-top:16px;"></p>
</div>

<div id="importBtnRow">
  <button id="loadVideoBtn" class="pillBtn" style="font-size:11px; padding:6px 12px; background:rgba(0,0,0,0.65);">Review Saved Video</button>
  <input type="file" id="videoFileInput" accept="video/*" style="display:none;">
</div>

<div id="topBar">
  <div style="width:130px;"></div> 
  <div id="badgeContainer">
    <div id="audioBadge"><div id="audioMeter"></div><span>MIC</span></div>
    <div id="recBadge"><span id="recDot"></span><span id="recLabel">REC</span></div>
  </div>
  <button id="flipBtn" class="iconBtn">&#8635;</button>
</div>

<div id="zoomIndicator"></div>
<div id="versionTag">v20-click-bounds-patch</div>

<div id="bottomBar">
  <div id="clockRow">
    <button id="resetClockBtn" class="smallBtn" disabled>&#8634;</button>
    <button id="clockBtn" class="pillBtn">Start clock</button>
    <button id="audioArmBtn" class="pillBtn">Auto-Arm Gun</button>
    <button id="lapBtn" class="pillBtn">Lap</button>
  </div>
  <div id="recRow">
    <div style="width:56px;"></div>
    <button id="recMainBtn"><span id="recIcon"></span></button>
    <button id="finishBtn" disabled>Finish</button>
  </div>
</div>

<div id="resultOverlay">
  <div id="resultVideoWrap">
    <video id="resultVideo" playsinline></video>
    <div id="bigPlayBtn">&#9654;</div>
  </div>
  <div id="frameStepBar">
    <button id="back5Btn" class="frameBtn">&#171;5</button><button id="prevFrameBtn" class="frameBtn">&#9664;1</button><button id="nextFrameBtn" class="frameBtn">1&#9654;</button><button id="fwd5Btn" class="frameBtn">5&#187;</button>
    <span style="color:rgba(244,241,234,.3);padding:0 4px;">|</span>
    <button id="speed1x" class="frameBtn speed activeSpeed" data-speed="1">1x</button><button id="speedSlow" class="frameBtn speed" data-speed="0.1">0.1x</button>
  </div>

  <div id="resultsDataContainer">
    <div id="markingRow">
      <button id="flashZeroBtn" class="syncActionBtn" title="Set this specific frame as race zero">Set Gun Flash (0.00)</button>
      <button id="syncVideoBtn" class="syncActionBtn">Manual Sync</button>
      <button id="markFinisherBtn">Mark Finisher (Space)</button>
    </div>
    <div id="tableWrapper">
      <table id="resultsTable">
        <thead>
          <tr>
            <th style="width: 60px;">Place</th>
            <th>True Race Time</th>
            <th style="width: 40px; text-align: center;"></th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </div>

  <div id="resultBar">
    <button id="exportCsvBtn">Export CSV</button>
    <button id="shareBtn">Share Video</button>
    <button id="downloadBtn">Save Video</button>
    <button id="discardBtn">Discard</button>
  </div>
</div>

<script>
(function(){
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  const permOverlay = document.getElementById('permOverlay');
  const permBtn = document.getElementById('permBtn');
  const permError = document.getElementById('permError');
  const flipBtn = document.getElementById('flipBtn');
  const recBadge = document.getElementById('recBadge');
  const recDot = document.getElementById('recDot');
  const recLabel = document.getElementById('recLabel');
  const zoomIndicator = document.getElementById('zoomIndicator');
  const audioMeter = document.getElementById('audioMeter');

  const clockBtn = document.getElementById('clockBtn');
  const audioArmBtn = document.getElementById('audioArmBtn');
  const resetClockBtn = document.getElementById('resetClockBtn');
  const lapBtn = document.getElementById('lapBtn');
  const recMainBtn = document.getElementById('recMainBtn');
  const recIcon = document.getElementById('recIcon');
  const finishBtn = document.getElementById('finishBtn');

  const loadVideoBtn = document.getElementById('loadVideoBtn');
  const videoFileInput = document.getElementById('videoFileInput');

  const resultOverlay = document.getElementById('resultOverlay');
  const resultVideo = document.getElementById('resultVideo');
  const resultVideoWrap = document.getElementById('resultVideoWrap');
  const bigPlayBtn = document.getElementById('bigPlayBtn');
  const prevFrameBtn=document.getElementById('prevFrameBtn');const nextFrameBtn=document.getElementById('nextFrameBtn');const back5Btn=document.getElementById('back5Btn');const fwd5Btn=document.getElementById('fwd5Btn');
  const shareBtn = document.getElementById('shareBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const discardBtn = document.getElementById('discardBtn');
  const markFinisherBtn = document.getElementById('markFinisherBtn');
  const syncVideoBtn = document.getElementById('syncVideoBtn');
  const flashZeroBtn = document.getElementById('flashZeroBtn');
  const resultsBody = document.getElementById('resultsBody');
  const exportCsvBtn = document.getElementById('exportCsvBtn');
  const installBtn = document.getElementById('installBtn');

  let facingMode = 'environment';
  let cameraStream = null;
  let zoomTrack = null;
  let zoomCaps = null;      
  let digitalZoomFactor = 1; 
  let audioCtx = null;
  let limitedAudioTrack = null;
  let wakeLock = null;

  let clockRunning = false;
  let clockElapsedMs = 0;
  let clockStartPerf = 0; 
  let lastLapMarkMs = 0; 
  let lapUsed = false;   
  
  let isAudioArmed = false;
  let isListeningForAudio = false;
  let armingTimeout = null;

  let recorder = null;
  let recordingState = 'idle'; 
  let recordedChunks = [];
  let lastBlobUrl = null;
  let recordingActiveMs = 0;      
  let activeSegmentStart = 0;     
  let lastRecordingDurationMs = 0;
  
  let videoTimelineMap = [];
  let finishersList = [];
  let isImportedVideoMode = false;
  let currentSyncLabelString = "0.00";

  function currentActiveDurationMs() {
    return recordingActiveMs + (recordingState === 'recording' ? performance.now() - activeSegmentStart : 0);
  }

  async function requestWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
  }

  function buildLimitedAudioTrack(rawTrack) {
    if (audioCtx) { try { audioCtx.close(); } catch (e) {} audioCtx = null; }
    if (!rawTrack) return null;
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      audioCtx = new Ctx();
      const source = audioCtx.createMediaStreamSource(new MediaStream([rawTrack]));
      const analyser = audioCtx.createAnalyser();
      analyser.fftSize = 32;
      const dataArray = new Uint8Array(analyser.frequencyBinCount);
      source.connect(analyser);

      function checkAudioVolume() {
        if (!audioCtx) return;
        analyser.getByteFrequencyData(dataArray);
        let sum = 0;
        for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
        let average = sum / dataArray.length;
        
        let scale = 1 + (average / 45);
        audioMeter.style.transform = `scale(${Math.min(2.5, scale)})`;
        
        if (average > 140) { 
          audioMeter.style.background = '#e78a8e'; 
          if (isAudioArmed && isListeningForAudio && !clockRunning) {
            startClockNow();
            isAudioArmed = false;
            isListeningForAudio = false;
            audioArmBtn.classList.remove('armed');
            audioArmBtn.style.background = '';
            audioArmBtn.textContent = "Auto-Arm Gun";
          }
        } else if (average > 80) {
          audioMeter.style.background = '#fcc419'; 
        } else {
          audioMeter.style.background = '#2f9e44'; 
        }
        requestAnimationFrame(checkAudioVolume);
      }
      checkAudioVolume();

      const limiter = audioCtx.createDynamicsCompressor();
      limiter.threshold.setValueAtTime(-10, audioCtx.currentTime);
      limiter.knee.setValueAtTime(4, audioCtx.currentTime);
      limiter.ratio.setValueAtTime(16, audioCtx.currentTime);
      limiter.attack.setValueAtTime(0.003, audioCtx.currentTime);
      limiter.release.setValueAtTime(0.2, audioCtx.currentTime);
      const dest = audioCtx.createMediaStreamDestination();
      source.connect(limiter).connect(dest);
      audioCtx.resume().catch(() => {});
      return dest.stream.getAudioTracks()[0] || rawTrack;
    } catch (e) { return rawTrack; }
  }

  async function startCamera() {
    if (!window.isSecureContext) {
      permError.textContent = 'HTTPS is required for camera and sound processing functionality.';
      return;
    }
    try {
      const isLandscape = window.innerWidth >= window.innerHeight;
      const targetAspect = isLandscape ? 16 / 9 : 9 / 16;
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode,
          aspectRatio: { ideal: targetAspect },
          width: { ideal: isLandscape ? 1920 : 1080 },
          height: { ideal: isLandscape ? 1080 : 1920 },
          frameRate: { ideal: 60 },
          zoom: true
        },
        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
      });
      cameraStream = stream;
      limitedAudioTrack = buildLimitedAudioTrack(stream.getAudioTracks()[0] || null);
      zoomTrack = stream.getVideoTracks()[0] || null;
      if (zoomTrack && zoomTrack.getCapabilities) {
        try { const caps = zoomTrack.getCapabilities(); if(caps.zoom) zoomCaps = caps.zoom; } catch(e){}
      }
      video.srcObject = stream;
      await video.play();
      permOverlay.classList.add('hidden');
      canvas.width = video.videoWidth || 1280;
      canvas.height = video.videoHeight || 720;
      requestWakeLock();
      requestAnimationFrame(drawLoop);
    } catch (err) {
      permError.textContent = 'Could not access peripherals: ' + err.name;
    }
  }

  flipBtn.addEventListener('click', async () => {
    if (recordingState !== 'idle') return;
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
    await startCamera();
  });
  permBtn.addEventListener('click', startCamera);

  audioArmBtn.addEventListener('click', () => {
    if (clockRunning) return;
    
    if (isAudioArmed) {
      isAudioArmed = false;
      isListeningForAudio = false;
      clearTimeout(armingTimeout);
      audioArmBtn.classList.remove('armed');
      audioArmBtn.style.background = '';
      audioArmBtn.textContent = "Auto-Arm Gun";
      return;
    }

    isAudioArmed = true;
    isListeningForAudio = false; 
    audioArmBtn.classList.add('armed');
    audioArmBtn.style.background = '#d9480f';
    
    let countdown = 3;
    audioArmBtn.textContent = `Arming in ${countdown}...`;
    
    const interval = setInterval(() => {
      countdown--;
      if (countdown > 0 && isAudioArmed) {
        audioArmBtn.textContent = `Arming in ${countdown}...`;
      } else {
        clearInterval(interval);
      }
    }, 1000);

    armingTimeout = setTimeout(() => {
      if (!isAudioArmed) return;
      isListeningForAudio = true; 
      audioArmBtn.style.background = '#e67e22'; 
      audioArmBtn.textContent = "ARMED & LISTENING";
    }, 3000);
  });

  function currentClockMs() { return clockElapsedMs + (clockRunning ? Date.now() - clockStartPerf : 0); }
  function currentLapMs() { return Math.max(0, currentClockMs() - lastLapMarkMs); }

  function formatClock(ms) {
    const isNegative = ms < 0;
    const absoluteMs = Math.abs(ms);
    const totalSec = absoluteMs / 1000;
    const m = Math.floor(totalSec / 60);
    const s = totalSec - m * 60;
    const sign = isNegative ? '-' : '';
    if (m === 0) return sign + s.toFixed(2);
    return `${sign}${m}:${s.toFixed(2).padStart(5, '0')}`;
  }

  function parseClockToMs(inputStr) {
    if (!inputStr) return 0;
    inputStr = inputStr.trim();
    let isNegative = inputStr.startsWith('-');
    if (isNegative) inputStr = inputStr.substring(1).trim();
    let calculatedMs = 0;
    if (inputStr.includes(':')) {
      const parts = inputStr.split(':');
      calculatedMs = Math.round(((parseFloat(parts[0])||0)*60 + (parseFloat(parts[1])||0))*1000);
    } else {
      calculatedMs = Math.round((parseFloat(inputStr)||0)*1000);
    }
    return isNegative ? -calculatedMs : calculatedMs;
  }

  function startClockNow() {
    if (clockRunning) return;
    clockStartPerf = Date.now();
    clockRunning = true;
    clockBtn.textContent = 'Stop clock';
    clockBtn.classList.add('active');
    resetClockBtn.disabled = true;
  }

  function stopClockNow() {
    if (!clockRunning) return;
    clockElapsedMs += Date.now() - clockStartPerf;
    clockRunning = false;
    clockBtn.textContent = 'Start clock';
    clockBtn.classList.remove('active');
    resetClockBtn.disabled = false;
  }

  clockBtn.addEventListener('click', () => { if (clockRunning) stopClockNow(); else startClockNow(); });
  resetClockBtn.addEventListener('click', () => {
    if (clockRunning) return;
    clockElapsedMs = 0; lastLapMarkMs = 0; lapUsed = false;
    resetClockBtn.disabled = true;
  });
  lapBtn.addEventListener('click', () => { lastLapMarkMs = currentClockMs(); lapUsed = true; });

  let pinchActive = false, pinchStartDist = 0, pinchStartZoomValue = 1;
  document.getElementById('stage').addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      pinchActive = true;
      pinchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      pinchStartZoomValue = zoomCaps ? (zoomTrack.getSettings().zoom || zoomCaps.min) : digitalZoomFactor;
    }
  }, { passive: true });
  document.getElementById('stage').addEventListener('touchmove', e => {
    if (pinchActive && e.touches.length === 2) {
      e.preventDefault();
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const ratio = dist / pinchStartDist;
      const target = pinchStartZoomValue * ratio;
      if (zoomCaps) {
        const clamped = Math.min(zoomCaps.max, Math.max(zoomCaps.min, target));
        zoomTrack.applyConstraints({ advanced: [{ zoom: clamped }] }).catch(() => {});
        zoomIndicator.textContent = clamped.toFixed(1) + 'x';
      } else {
        digitalZoomFactor = Math.min(4, Math.max(1, target));
        zoomIndicator.textContent = digitalZoomFactor.toFixed(1) + 'x (digital)';
      }
      zoomIndicator.classList.add('show');
      clearTimeout(window._zT); window._zT = setTimeout(() => zoomIndicator.classList.remove('show'), 1000);
    }
  }, { passive: false });

  function drawLoop() {
    if (video.readyState >= 2) {
      if (!zoomCaps && digitalZoomFactor > 1) {
        const sw = video.videoWidth / digitalZoomFactor, sh = video.videoHeight / digitalZoomFactor;
        ctx.drawImage(video, (video.videoWidth-sw)/2, (video.videoHeight-sh)/2, sw, sh, 0, 0, canvas.width, canvas.height);
      } else {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      }
      const fSize = Math.round(canvas.width * 0.045);
      ctx.font = `700 ${fSize}px ui-monospace, monospace`;
      ctx.lineJoin = 'round'; ctx.lineWidth = fSize * 0.15; ctx.strokeStyle = 'rgba(0,0,0,0.8)';
      
      const txt = formatClock(currentClockMs());
      ctx.strokeText(txt, fSize * 0.5, canvas.height - fSize * 0.5);
      ctx.fillStyle = clockRunning ? '#f4f1ea' : '#c9a227';
      ctx.fillText(txt, fSize * 0.5, canvas.height - fSize * 0.5);

      if (lapUsed) {
        const lapTxt = formatClock(currentLapMs());
        ctx.font = `700 ${Math.round(fSize*0.6)}px ui-monospace, monospace`;
        ctx.strokeText(lapTxt, fSize * 0.5, canvas.height - fSize * 1.8);
        ctx.fillStyle = '#f4f1ea';
        ctx.fillText(lapTxt, fSize * 0.5, canvas.height - fSize * 1.8);
      }
    }
    requestAnimationFrame(drawLoop);
  }

  loadVideoBtn.addEventListener('click', () => videoFileInput.click());
  
  videoFileInput.addEventListener('change', (e) => {
    const file = e.target.files[0]; if (!file) return;
    if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
    lastBlobUrl = URL.createObjectURL(file);
    
    resultVideo.pause();
    resultVideo.src = lastBlobUrl;
    resultVideo.load();
    resultVideo.muted = true; 
    bigPlayBtn.classList.remove('hidden');
    
    resultVideo.play().then(() => {
      resultVideo.pause(); 
    }).catch(err => console.log("Autoplay context ready."));

    videoTimelineMap = [{ videoStart: 0, raceStart: 0 }];
    isImportedVideoMode = true; finishersList = []; renderResultsTable();
    shareBtn.style.display = 'none'; downloadBtn.style.display = 'none'; syncVideoBtn.style.display = 'inline-block';
    resultOverlay.classList.add('show');
  });

  flashZeroBtn.addEventListener('click', () => {
    resultVideo.pause();
    bigPlayBtn.classList.remove('hidden');
    const currentVideoMs = resultVideo.currentTime * 1000;
    videoTimelineMap = [{ videoStart: currentVideoMs, raceStart: 0 }];
    videoTimelineMap.unshift({ videoStart: 0, raceStart: -currentVideoMs });
    currentSyncLabelString = "0.00 (Flash Checked)";
    alert(`Clock Zero anchored to this frame! Everything backward from here is now calibrated as a negative countdown.`);
    if (finishersList.length > 0) {
      finishersList = [];
      renderResultsTable();
    }
  });

  syncVideoBtn.addEventListener('click', () => {
    resultVideo.pause();
    bigPlayBtn.classList.remove('hidden');
    const promptValue = prompt("Manual Sync Entry. Enter actual race clock time seen on screen:", currentSyncLabelString);
    if (promptValue === null) return;
    const targetRaceMs = parseClockToMs(promptValue);
    videoTimelineMap = [{ videoStart: 0, raceStart: targetRaceMs - (resultVideo.currentTime * 1000) }];
    currentSyncLabelString = promptValue.trim();
  });

  function startRecording() {
    const combined = new MediaStream([...canvas.captureStream(60).getVideoTracks(), ...(limitedAudioTrack?[limitedAudioTrack]:(cameraStream?cameraStream.getAudioTracks():[]))]);
    recorder = new MediaRecorder(combined, { videoBitsPerSecond: 8_000_000 });
    recordedChunks = [];
    recorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    recorder.onstop = () => {
      const b = new Blob(recordedChunks, { type: 'video/webm' });
      const process = (blob) => {
        if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
        lastBlobUrl = URL.createObjectURL(blob); 
        resultVideo.src = lastBlobUrl;
        resultVideo.load();
        bigPlayBtn.classList.remove('hidden');
        
        isImportedVideoMode = false; finishersList = []; renderResultsTable();
        shareBtn.style.display = 'inline-block'; downloadBtn.style.display = 'inline-block'; syncVideoBtn.style.display = 'none';
        resultOverlay.classList.add('show'); window.__lastBlob = blob;
      };
      if (window.ysFixWebmDuration && lastRecordingDurationMs > 0) {
        window.ysFixWebmDuration(b, lastRecordingDurationMs, { logger: false }).then(process).catch(()=>process(b));
      } else { process(b); }
    };
    recorder.start(1000); recordingActiveMs = 0; activeSegmentStart = performance.now(); recordingState = 'recording';
    videoTimelineMap = [{ videoStart: 0, raceStart: currentClockMs() }];
    updateRecUI();
  }

  recMainBtn.addEventListener('click', () => {
    if (recordingState === 'idle') startRecording();
    else if (recordingState === 'recording') { recorder.pause(); recordingActiveMs += performance.now()-activeSegmentStart; recordingState = 'paused'; updateRecUI(); }
    else if (recordingState === 'paused') { recorder.resume(); activeSegmentStart = performance.now(); recordingState = 'recording'; videoTimelineMap.push({ videoStart: recordingActiveMs, raceStart: currentClockMs() }); updateRecUI(); }
  });
  finishBtn.addEventListener('click', () => { lastRecordingDurationMs = currentActiveDurationMs(); recorder.stop(); recordingState = 'idle'; updateRecUI(); });

  function updateRecUI() {
    recMainBtn.className = 'state-' + (recordingState==='starting'?'recording':recordingState);
    recIcon.innerHTML = recordingState === 'recording' ? '&#10074;&#10074;' : '&#9654;';
    finishBtn.disabled = (recordingState === 'idle');
    recBadge.className = 'live' + (recordingState==='paused'?' paused':'');
    recDot.className = recordingState==='recording'?'blink':'';
    recLabel.textContent = recordingState==='paused'?'PAUSED':'REC';
  }

  let FRAME_STEP_SEC=1/60;
  function step(d) { 
    resultVideo.pause(); 
    bigPlayBtn.classList.remove('hidden');
    resultVideo.currentTime = Math.max(0, Math.min(resultVideo.duration, resultVideo.currentTime + d * FRAME_STEP_SEC)); 
  }
  prevFrameBtn.onclick=()=>step(-1); nextFrameBtn.onclick=()=>step(1); back5Btn.onclick=()=>step(-5); fwd5Btn.onclick=()=>step(5);
  
  document.querySelectorAll('.speed').forEach(b=>{
    b.onclick=()=>{
      resultVideo.playbackRate=parseFloat(b.dataset.speed);
      document.querySelectorAll('.speed').forEach(s=>s.classList.remove('activeSpeed')); b.classList.add('activeSpeed');
    };
  });
  
  // Clean, unified playback controller on the video window container
  let sX=0, sT=0, sM=false;
  resultVideoWrap.addEventListener('touchstart', e => { 
    sX=e.touches[0].clientX; sT=resultVideo.currentTime; sM=false; 
  }, { passive: true });
  
  resultVideoWrap.addEventListener('touchmove', e => { 
    const dx=e.touches[0].clientX-sX; 
    if(Math.abs(dx)>6) sM=true; 
    if(sM) { 
      resultVideo.pause(); 
      bigPlayBtn.classList.remove('hidden');
      resultVideo.currentTime=Math.max(0,Math.min(resultVideo.duration, sT+dx*0.012)); 
    }
  }, { passive: false });
  
  resultVideoWrap.addEventListener('touchend', () => { 
    if(!sM) { toggleVideoPlayback(); }
  });

  // Desktop/Mouse click implementation
  resultVideoWrap.addEventListener('click', (e) => {
    // If it's a simulated or true mouse click and not part of a swipe exit gesture
    if(!sM) { toggleVideoPlayback(); }
  });

  function toggleVideoPlayback() {
    if (resultVideo.paused) {
      resultVideo.play().then(() => {
        bigPlayBtn.classList.add('hidden');
      }).catch(() => {});
    } else {
      resultVideo.pause();
      bigPlayBtn.classList.remove('hidden');
    }
  }

  function markCurrentFinisher() {
    const vMs = resultVideo.currentTime * 1000;
    let seg = videoTimelineMap[0] || { videoStart: 0, raceStart: 0 };
    for (let i = 0; i < videoTimelineMap.length; i++) { if (vMs >= videoTimelineMap[i].videoStart) seg = videoTimelineMap[i]; }
    finishersList.push(formatClock(seg.raceStart + (vMs - seg.videoStart)));
    renderResultsTable();
  }

  function renderResultsTable() {
    resultsBody.innerHTML = '';
    finishersList.forEach((t, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${i+1}</td><td style="font-weight:bold;">${t}</td><td style="text-align:center;"><button class="deleteRowBtn">&times;</button></td>`;
      tr.querySelector('.deleteRowBtn').onclick = () => { finishersList.splice(i,1); renderResultsTable(); };
      resultsBody.appendChild(tr);
    });
  }

  markFinisherBtn.onclick = markCurrentFinisher;
  window.onkeydown = (e) => { if (resultOverlay.classList.contains('show') && e.code === 'Space') { e.preventDefault(); markCurrentFinisher(); } };

  exportCsvBtn.onclick = () => {
    const p = prompt("Optional file description name prefix:", "");
    let csv = 'Place,True Race Time\n'; finishersList.forEach((t, i) => csv += `${i+1},${t}\n`);
    const link = document.createElement('a'); link.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    link.download = `${p?p.trim().replace(/[^a-z0-9]/gi,'_')+'-':''}results-${Date.now()}.csv`; link.click();
  };

  discardBtn.onclick = () => { if(confirm('Exit review mode? Unsaved selections will be lost.')) { resultOverlay.classList.remove('show'); resultVideo.pause(); recordedChunks=[]; finishersList=[]; videoTimelineMap=[]; } };
  downloadBtn.onclick = () => { const a=document.createElement('a'); a.href=lastBlobUrl; a.download=`race-${Date.now()}.webm`; a.click(); };
})();
</script>
</body>
