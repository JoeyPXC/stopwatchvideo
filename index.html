<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#161513">
<title>Stopwatch Video</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/fix-webm-duration@1.0.6/fix-webm-duration.js"></script>
<style>
  :root{
    --track-red:#c1272d;
    --ink:#161513;
    --paper:#f4f1ea;
    --mono: 'Consolas','SFMono-Regular',Menlo,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;
    width:100%;height:100%;
    background:#000;
    overflow:hidden;
    font-family:var(--mono);
    color:var(--paper);
  }
  #stage{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
    background:#000;
  }
  video{display:none;}
  canvas{
    max-width:100%;max-height:100%;
    width:auto;height:auto;
    display:block;
  }

  #permOverlay{
    position:fixed;inset:0;
    background:var(--ink);
    color:var(--paper);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:32px;
    z-index:50;
  }
  #permOverlay h1{font-size:20px;margin:0 0 12px;}
  #permOverlay p{font-size:14px;line-height:1.6;color:#c9c4b8;max-width:44ch;margin:0 0 20px;}
  #permOverlay button{
    font-family:var(--mono);
    font-size:14px;letter-spacing:.05em;text-transform:uppercase;
    background:var(--track-red);color:var(--paper);
    border:none;border-radius:6px;
    padding:14px 26px;
    cursor:pointer;
  }
  #permOverlay.hidden{display:none;}

  /* top bar */
  #topBar{
    position:fixed;top:0;left:0;right:0;
    display:flex;justify-content:space-between;align-items:center;
    padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
    background:linear-gradient(rgba(0,0,0,.55),transparent);
    z-index:20;
  }
  .iconBtn{
    width:44px;height:44px;
    border-radius:50%;
    border:none;
    background:rgba(0,0,0,.35);
    color:var(--paper);
    font-size:20px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .iconBtn:active{background:rgba(193,39,45,.6);}

  #recBadge{
    font-size:12px;letter-spacing:.08em;
    padding:6px 12px;border-radius:20px;
    background:rgba(0,0,0,.4);
    display:flex;align-items:center;gap:6px;
    visibility:hidden;
  }
  #recBadge.live{visibility:visible;}
  #recDot{width:9px;height:9px;border-radius:50%;background:var(--track-red);}
  #recBadge.paused #recDot{background:#c9a227;}
  #recDot.blink{animation:blink 1s infinite;}
  @keyframes blink{50%{opacity:.25;}}

  /* bottom controls */
  #bottomBar{
    position:fixed;bottom:0;left:0;right:0;
    display:flex;flex-direction:column;align-items:center;gap:14px;
    padding:14px 18px calc(20px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent,rgba(0,0,0,.6));
    z-index:20;
  }
  #clockRow{
    display:flex;align-items:center;gap:10px;justify-content:center;flex-wrap:wrap;
  }
  .pillBtn{
    font-family:var(--mono);
    font-size:13px;letter-spacing:.05em;text-transform:uppercase;
    border:1px solid rgba(244,241,234,.4);
    background:rgba(0,0,0,.35);
    color:var(--paper);
    border-radius:24px;
    padding:10px 18px;
    cursor:pointer;
  }
  .pillBtn.active{background:var(--track-red);border-color:var(--track-red);}
  .pillBtn:disabled{opacity:.35;}
  .smallBtn{
    width:40px;height:40px;border-radius:50%;
    border:1px solid rgba(244,241,234,.4);
    background:rgba(0,0,0,.35);
    color:var(--paper);
    font-size:15px;
    cursor:pointer;
  }
  .smallBtn:disabled{opacity:.3;}

  #recRow{
    display:flex;align-items:center;gap:26px;
  }
  #recMainBtn{
    width:76px;height:76px;border-radius:50%;
    border:4px solid var(--paper);
    background:var(--track-red);
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    padding:0;
  }
  #recMainBtn #recIcon{
    font-size:22px;
    line-height:1;
    color:var(--paper);
  }
  #recMainBtn.state-paused{background:#c9a227;}
  #recMainBtn.state-recording #recIcon{color:var(--track-red);}
  #recMainBtn.state-recording{background:var(--paper);}
  #finishBtn{
    font-family:var(--mono);
    font-size:12px;letter-spacing:.05em;text-transform:uppercase;
    width:56px;height:56px;border-radius:50%;
    border:1px solid rgba(244,241,234,.4);
    background:rgba(0,0,0,.35);
    color:var(--paper);
    cursor:pointer;
  }
  #finishBtn:disabled{opacity:.3;}
  #finishBtn.ready{background:#2f9e44;border-color:#2f9e44;}

  /* result / share screen */
  #resultOverlay{
    position:fixed;inset:0;
    background:var(--ink);
    display:none;
    flex-direction:column;
    z-index:40;
  }
  #resultOverlay.show{display:flex;}
  #resultVideoWrap{
    position:relative;
    flex:1;min-height:0;
    width:100%;
    background:#000;
    overflow:hidden;
  }
  #resultVideoWrap video{
    display:block;
    width:100%;height:100%;
    object-fit:contain;
    touch-action:none;
  }
  #bigPlayBtn{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    width:76px;height:76px;
    border-radius:50%;
    background:rgba(0,0,0,.55);
    color:var(--paper);
    display:flex;align-items:center;justify-content:center;
    font-size:28px;
    padding-left:6px;
    pointer-events:none;
    transition:opacity .15s ease;
  }
  #bigPlayBtn.hidden{opacity:0;}
  #resultBar{
    padding:14px 18px calc(18px + env(safe-area-inset-bottom));
    display:flex;gap:10px;flex-wrap:wrap;
    justify-content:center;
  }
  #resultBar button{
    font-family:var(--mono);
    font-size:13px;letter-spacing:.05em;text-transform:uppercase;
    border:none;border-radius:6px;
    padding:14px 18px;
    cursor:pointer;
  }
  #shareBtn{background:var(--track-red);color:var(--paper);}
  #downloadBtn{background:var(--paper);color:var(--ink);}
  #discardBtn{background:transparent;color:#c9c4b8;border:1px solid #4a4640 !important;}

  #frameStepBar{
    padding:10px 18px;
    display:flex;gap:10px;justify-content:center;
    background:var(--ink);
  }
  .frameBtn{
    font-family:var(--mono);
    font-size:13px;letter-spacing:.03em;text-transform:uppercase;
    background:transparent;
    color:var(--paper);
    border:1px solid rgba(244,241,234,.4);
    border-radius:20px;
    padding:10px 18px;
    cursor:pointer;
  }
  .frameBtn:active{background:var(--track-red);border-color:var(--track-red);}

  #zoomIndicator{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-family:var(--mono);
    font-weight:700;
    font-size:22px;
    background:rgba(0,0,0,.5);
    color:var(--paper);
    padding:10px 18px;
    border-radius:14px;
    z-index:30;
    opacity:0;
    pointer-events:none;
    transition:opacity .15s ease;
  }
  #zoomIndicator.show{opacity:1;}

  #installBtn{
    position:fixed;
    top:calc(10px + env(safe-area-inset-top));
    left:50%;
    transform:translateX(-50%);
    display:none;
    font-family:var(--mono);
    font-size:11px;letter-spacing:.05em;text-transform:uppercase;
    background:var(--track-red);color:var(--paper);
    border:none;border-radius:20px;
    padding:8px 16px;
    z-index:25;
  }

  #versionTag{
    position:fixed;
    bottom:calc(4px + env(safe-area-inset-bottom));
    right:6px;
    font-family:var(--mono);
    font-size:9px;
    color:rgba(244,241,234,.35);
    z-index:15;
    pointer-events:none;
  }
</style>
</head>
<body>

<div id="stage">
  <video id="video" playsinline muted autoplay></video>
  <canvas id="canvas"></canvas>
</div>

<button id="installBtn">Install app</button>

<div id="permOverlay">
  <h1>Stopwatch Video</h1>
  <p>Needs access to your camera (and microphone, for crowd/gun audio) to record. Nothing is uploaded anywhere &mdash; recording stays on this device until you share it.</p>
  <button id="permBtn">Enable camera</button>
  <p id="permError" style="color:#e78a8e;margin-top:16px;"></p>
</div>

<div id="topBar">
  <button id="flipBtn" class="iconBtn" title="Flip camera">&#8635;</button>
  <div id="recBadge"><span id="recDot"></span><span id="recLabel">REC</span></div>
  <div style="width:44px;"></div>
</div>

<div id="zoomIndicator"></div>

<div id="versionTag">v8</div>

<div id="bottomBar">
  <div id="clockRow">
    <button id="resetClockBtn" class="smallBtn" title="Reset clock">&#8634;</button>
    <button id="clockBtn" class="pillBtn">Start clock</button>
    <button id="lapBtn" class="pillBtn" title="Mark a lap">Lap</button>
  </div>
  <div id="recRow">
    <div style="width:56px;"></div>
    <button id="recMainBtn" title="Record / pause / resume"><span id="recIcon"></span></button>
    <button id="finishBtn" title="Finish and save" disabled>Finish</button>
  </div>
</div>

<div id="resultOverlay">
  <div id="resultVideoWrap">
    <video id="resultVideo" playsinline></video>
    <div id="bigPlayBtn">&#9654;</div>
  </div>
  <div id="frameStepBar">
    <button id="prevFrameBtn" class="frameBtn">&#9664;&#9664; Frame</button>
    <button id="nextFrameBtn" class="frameBtn">Frame &#9654;&#9654;</button>
  </div>
  <div id="resultBar">
    <button id="shareBtn">Share</button>
    <button id="downloadBtn">Save to device</button>
    <button id="discardBtn">Discard &amp; record again</button>
  </div>
</div>

<script>
(function(){
  const video = document.getElementById('video');
  const stage = document.getElementById('stage');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  const permOverlay = document.getElementById('permOverlay');
  const permBtn = document.getElementById('permBtn');
  const permError = document.getElementById('permError');

  const flipBtn = document.getElementById('flipBtn');
  const recBadge = document.getElementById('recBadge');
  const recDot = document.getElementById('recDot');
  const recLabel = document.getElementById('recLabel');
  const zoomIndicator = document.getElementById('zoomIndicator');

  const clockBtn = document.getElementById('clockBtn');
  const resetClockBtn = document.getElementById('resetClockBtn');
  const lapBtn = document.getElementById('lapBtn');
  const recMainBtn = document.getElementById('recMainBtn');
  const recIcon = document.getElementById('recIcon');
  const finishBtn = document.getElementById('finishBtn');

  const resultOverlay = document.getElementById('resultOverlay');
  const resultVideo = document.getElementById('resultVideo');
  const resultVideoWrap = document.getElementById('resultVideoWrap');
  const bigPlayBtn = document.getElementById('bigPlayBtn');
  const prevFrameBtn = document.getElementById('prevFrameBtn');
  const nextFrameBtn = document.getElementById('nextFrameBtn');
  const shareBtn = document.getElementById('shareBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const discardBtn = document.getElementById('discardBtn');

  const installBtn = document.getElementById('installBtn');

  function isIOS() {
    return /iP(hone|od|ad)/.test(navigator.userAgent) ||
      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1); // iPadOS reports as Mac
  }
  if (isIOS()) downloadBtn.textContent = 'Save (via Share Sheet)';

  let facingMode = 'environment';
  let cameraStream = null;
  let zoomTrack = null;
  let zoomCaps = null;      // {min, max, step} if the device supports real hardware zoom
  let digitalZoomFactor = 1; // used as a fallback when hardware zoom isn't available
  let audioCtx = null;
  let limitedAudioTrack = null;

  let clockRunning = false;
  let clockElapsedMs = 0;
  let clockStartPerf = 0;
  let lastLapMarkMs = 0; // total-clock time (ms) at which the current lap started
  let lapUsed = false;   // true only once the Lap button has actually been pressed

  let recorder = null;
  let recordingState = 'idle'; // idle | recording | paused
  let recordedChunks = [];
  let lastBlobUrl = null;
  let recordingActiveMs = 0;      // accumulated duration across all non-paused segments
  let activeSegmentStart = 0;     // performance.now() when the current active segment began
  let lastRecordingDurationMs = 0;

  function currentActiveDurationMs() {
    return recordingActiveMs + (recordingState === 'recording' ? performance.now() - activeSegmentStart : 0);
  }

  // ---------- Camera setup ----------

  function buildLimitedAudioTrack(rawTrack) {
    // Auto-gain/noise-suppression are off so ambient sound isn't suppressed,
    // which means loud peaks (PA system, gun, crowd) can clip and crackle.
    // This runs the raw mic through a fast limiter that only catches peaks
    // right before they'd clip, leaving normal volume levels untouched.
    if (audioCtx) { try { audioCtx.close(); } catch (e) {} audioCtx = null; }
    if (!rawTrack) return null;
    try {
      const Ctx = window.AudioContext || window.webkitAudioContext;
      audioCtx = new Ctx();
      const source = audioCtx.createMediaStreamSource(new MediaStream([rawTrack]));
      const limiter = audioCtx.createDynamicsCompressor();
      limiter.threshold.setValueAtTime(-10, audioCtx.currentTime);
      limiter.knee.setValueAtTime(4, audioCtx.currentTime);
      limiter.ratio.setValueAtTime(16, audioCtx.currentTime);
      limiter.attack.setValueAtTime(0.003, audioCtx.currentTime);
      limiter.release.setValueAtTime(0.2, audioCtx.currentTime);
      const dest = audioCtx.createMediaStreamDestination();
      source.connect(limiter).connect(dest);

      audioCtx.resume().catch(() => {});
      return dest.stream.getAudioTracks()[0] || rawTrack;
    } catch (e) {
      return rawTrack; // if Web Audio processing fails for any reason, fall back to raw audio
    }
  }

  async function startCamera() {
    if (!window.isSecureContext) {
      permError.textContent = 'This page must be served over HTTPS (or localhost) for the camera to work.';
      return;
    }
    try {
      const isLandscape = window.innerWidth >= window.innerHeight;
      const targetAspect = isLandscape ? 16 / 9 : 9 / 16;
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode,
          aspectRatio: { ideal: targetAspect },
          width: { ideal: isLandscape ? 1920 : 1080 },
          height: { ideal: isLandscape ? 1080 : 1920 },
          frameRate: { ideal: 60 },
          zoom: true
        },
        audio: {
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false
        }
      });
      cameraStream = stream;
      limitedAudioTrack = buildLimitedAudioTrack(stream.getAudioTracks()[0] || null);

      zoomTrack = stream.getVideoTracks()[0] || null;
      digitalZoomFactor = 1;
      zoomCaps = null;
      try {
        const caps = zoomTrack && zoomTrack.getCapabilities ? zoomTrack.getCapabilities() : null;
        if (caps && caps.zoom) zoomCaps = caps.zoom; // {min, max, step}
      } catch (e) {}

      video.srcObject = stream;
      await video.play();
      permOverlay.classList.add('hidden');
      sizeCanvasToVideo();
      requestAnimationFrame(drawLoop);
    } catch (err) {
      permError.textContent = 'Could not access camera: ' + (err.message || err.name);
    }
  }

  function sizeCanvasToVideo() {
    const vw = video.videoWidth || 1280;
    const vh = video.videoHeight || 720;
    canvas.width = vw;
    canvas.height = vh;
  }

  async function flipCamera() {
    if (recordingState !== 'idle') return; // keep it simple: no flipping mid-recording
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    if (cameraStream) cameraStream.getTracks().forEach(t => t.stop());
    await startCamera();
  }

  flipBtn.addEventListener('click', flipCamera);
  permBtn.addEventListener('click', startCamera);

  // Re-request the camera stream when the phone rotates, so landscape and
  // portrait each capture (and fill) their own native screen aspect ratio.
  // Never interrupts an active recording — just waits until it's finished.
  let orientationDebounce = null;
  function handleOrientationChange() {
    if (!cameraStream) return;
    clearTimeout(orientationDebounce);
    orientationDebounce = setTimeout(() => {
      if (recordingState !== 'idle') return; // don't disrupt an active/paused recording
      cameraStream.getTracks().forEach(t => t.stop());
      startCamera();
    }, 350);
  }
  window.addEventListener('orientationchange', handleOrientationChange);
  window.addEventListener('resize', handleOrientationChange);

  // ---------- Clock ----------

  function currentClockMs() {
    return clockElapsedMs + (clockRunning ? performance.now() - clockStartPerf : 0);
  }

  function currentLapMs() {
    return Math.max(0, currentClockMs() - lastLapMarkMs);
  }

  function formatClock(ms) {
    const totalSec = ms / 1000;
    const m = Math.floor(totalSec / 60);
    const s = totalSec - m * 60;
    if (m === 0) return s.toFixed(2);
    return `${m}:${s.toFixed(2).padStart(5, '0')}`;
  }

  function startClockNow() {
    if (clockRunning) return;
    clockStartPerf = performance.now();
    clockRunning = true;
    clockBtn.textContent = 'Stop clock';
    clockBtn.classList.add('active');
    resetClockBtn.disabled = true;
  }

  function stopClockNow() {
    if (!clockRunning) return;
    clockElapsedMs += performance.now() - clockStartPerf;
    clockRunning = false;
    clockBtn.textContent = 'Start clock';
    clockBtn.classList.remove('active');
    resetClockBtn.disabled = false;
  }

  clockBtn.addEventListener('click', () => {
    if (clockRunning) stopClockNow(); else startClockNow();
  });

  resetClockBtn.addEventListener('click', () => {
    if (clockRunning) return;
    clockElapsedMs = 0;
    lastLapMarkMs = 0;
    lapUsed = false;
  });

  lapBtn.addEventListener('click', () => {
    lastLapMarkMs = currentClockMs();
    lapUsed = true;
  });

  // ---------- Draw loop (burns the clock into the canvas every frame) ----------

  // ---------- Pinch-to-zoom ----------

  let pinchActive = false;
  let pinchStartDist = 0;
  let pinchStartZoomValue = 1;

  function touchDistance(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function currentZoomValue() {
    if (zoomCaps) {
      const settings = zoomTrack && zoomTrack.getSettings ? zoomTrack.getSettings() : null;
      return (settings && typeof settings.zoom === 'number') ? settings.zoom : zoomCaps.min;
    }
    return digitalZoomFactor;
  }

  function showZoomIndicator(text) {
    zoomIndicator.textContent = text;
    zoomIndicator.classList.add('show');
    clearTimeout(showZoomIndicator._t);
    showZoomIndicator._t = setTimeout(() => zoomIndicator.classList.remove('show'), 1200);
  }

  function applyZoomValue(value) {
    if (zoomCaps) {
      const clamped = Math.min(zoomCaps.max, Math.max(zoomCaps.min, value));
      if (zoomTrack && zoomTrack.applyConstraints) {
        zoomTrack.applyConstraints({ advanced: [{ zoom: clamped }] }).catch(() => {});
      }
      showZoomIndicator(clamped.toFixed(1) + 'x');
    } else {
      const clamped = Math.min(4, Math.max(1, value));
      digitalZoomFactor = clamped;
      showZoomIndicator(clamped.toFixed(1) + 'x (digital)');
    }
  }

  stage.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      pinchActive = true;
      pinchStartDist = touchDistance(e.touches);
      pinchStartZoomValue = currentZoomValue();
    }
  }, { passive: true });

  stage.addEventListener('touchmove', e => {
    if (pinchActive && e.touches.length === 2) {
      e.preventDefault(); // stop the browser's own page-zoom gesture from fighting with this
      const dist = touchDistance(e.touches);
      if (pinchStartDist > 0) {
        const ratio = dist / pinchStartDist;
        applyZoomValue(pinchStartZoomValue * ratio);
      }
    }
  }, { passive: false });

  stage.addEventListener('touchend', e => {
    if (e.touches.length < 2) pinchActive = false;
  }, { passive: true });

  stage.addEventListener('touchcancel', () => { pinchActive = false; }, { passive: true });

  function drawLoop() {
    // Only allow the recording frame size to track the camera when idle.
    // Once recording starts, the frame size is locked for the whole
    // recording — a physical device rotation mid-recording should never
    // change (or visually rotate) the video that's already in progress.
    if (recordingState === 'idle' && video.videoWidth &&
        (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight)) {
      sizeCanvasToVideo();
    }
    if (video.readyState >= 2) {
      if (!zoomCaps && digitalZoomFactor > 1 && video.videoWidth) {
        // Digital zoom fallback: draw a centered crop of the source frame,
        // scaled up to fill the recording frame. Hardware zoom (when
        // available) already returns a zoomed frame directly, so this only
        // applies when there's no real optical/hybrid zoom on the device.
        const sw = video.videoWidth / digitalZoomFactor;
        const sh = video.videoHeight / digitalZoomFactor;
        const sx = (video.videoWidth - sw) / 2;
        const sy = (video.videoHeight - sh) / 2;
        ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
      } else {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      }
      drawClockOverlay();
    }
    requestAnimationFrame(drawLoop);
  }

  function drawTimeText(text, x, baselineY, fontSize, color) {
    ctx.font = `700 ${fontSize}px Consolas, Menlo, monospace`;
    ctx.textBaseline = 'alphabetic';
    ctx.lineJoin = 'round';
    ctx.lineWidth = Math.max(2, fontSize * 0.14);
    ctx.strokeStyle = 'rgba(0,0,0,0.8)';
    ctx.strokeText(text, x, baselineY);
    ctx.fillStyle = color;
    ctx.fillText(text, x, baselineY);
  }

  function drawClockOverlay() {
    const totalFontSize = Math.round(canvas.width * 0.045);
    const lapFontSize = Math.round(totalFontSize * 0.6);
    const x = totalFontSize * 0.5;
    const totalBaselineY = canvas.height - totalFontSize * 0.5;
    const lapBaselineY = totalBaselineY - totalFontSize * 1.15;

    const totalColor = clockRunning ? '#f4f1ea' : '#c9a227';
    drawTimeText(formatClock(currentClockMs()), x, totalBaselineY, totalFontSize, totalColor);

    // Only show the lap time once the Lap button has actually been pressed —
    // otherwise stay a single clean total-time display, no clutter.
    if (lapUsed) {
      drawTimeText(formatClock(currentLapMs()), x, lapBaselineY, lapFontSize, '#f4f1ea');
    }
  }

  function roundRect(c, x, y, w, h, r) {
    c.beginPath();
    c.moveTo(x + r, y);
    c.arcTo(x + w, y, x + w, y + h, r);
    c.arcTo(x + w, y + h, x, y + h, r);
    c.arcTo(x, y + h, x, y, r);
    c.arcTo(x, y, x + w, y, r);
    c.closePath();
  }

  // ---------- Recording ----------

  function pickMimeType() {
    const candidates = [
      'video/webm;codecs=vp8,opus',
      'video/webm;codecs=vp8',
      'video/webm'
    ];
    for (const c of candidates) {
      if (window.MediaRecorder && MediaRecorder.isTypeSupported(c)) return c;
    }
    return '';
  }

  async function lockOrientationForRecording() {
    const type = window.innerWidth >= window.innerHeight ? 'landscape' : 'portrait';

    // The orientation lock API requires the document to actually be in
    // Fullscreen-API fullscreen — "standalone" PWA display doesn't count,
    // even though it looks fullscreen. This is the real precondition.
    if (!document.fullscreenElement) {
      try {
        await document.documentElement.requestFullscreen();
      } catch (e) {
        // Continue anyway — the lock attempt below will report its own
        // specific error if fullscreen was actually required and missing.
      }
    }

    if (!screen.orientation || !screen.orientation.lock) return;
    try {
      await screen.orientation.lock(type);
    } catch (e) {
      // Not supported/permitted on this device — the frame-lock in drawLoop()
      // still prevents the video itself from changing shape, just without
      // physically stopping the phone's screen from rotating underneath it.
    }
  }

  function unlockOrientation() {
    try { screen.orientation.unlock(); } catch (e) {}
    if (document.fullscreenElement) {
      try { document.exitFullscreen(); } catch (e) {}
    }
  }

  function startRecording() {
    const canvasStream = canvas.captureStream(60);
    const audioTracks = limitedAudioTrack
      ? [limitedAudioTrack]
      : (cameraStream ? cameraStream.getAudioTracks() : []);
    const combined = new MediaStream([...canvasStream.getVideoTracks(), ...audioTracks]);

    const mimeType = pickMimeType();
    const recorderOpts = { videoBitsPerSecond: 8_000_000, audioBitsPerSecond: 128_000 };
    if (mimeType) recorderOpts.mimeType = mimeType;
    recorder = new MediaRecorder(combined, recorderOpts);

    recordedChunks = [];
    recorder.ondataavailable = e => { if (e.data && e.data.size > 0) recordedChunks.push(e.data); };
    recorder.onstop = onRecordingStopped;

    recordingState = 'starting';
    updateRecUI();

    // Give the freshly-combined video+audio stream a brief moment to settle
    // before the encoder actually starts consuming it. Starting a
    // MediaRecorder the instant a stream is created is a known source of a
    // short audio crackle right at the very beginning of a recording.
    setTimeout(() => {
      if (recordingState !== 'starting' || !recorder) return;
      recorder.start(1000);
      lockOrientationForRecording();
      recordingActiveMs = 0;
      activeSegmentStart = performance.now();
      recordingState = 'recording';
      updateRecUI();
    }, 200);
  }

  function pauseRecording() {
    if (!recorder || recordingState !== 'recording') return;
    recorder.pause();
    recordingActiveMs += performance.now() - activeSegmentStart;
    recordingState = 'paused';
    updateRecUI();
  }

  function resumeRecording() {
    if (!recorder || recordingState !== 'paused') return;
    recorder.resume();
    activeSegmentStart = performance.now();
    recordingState = 'recording';
    updateRecUI();
  }

  function finishRecording() {
    if (!recorder || recordingState === 'idle' || recordingState === 'starting') return;
    lastRecordingDurationMs = currentActiveDurationMs();
    recorder.stop();
    recordingState = 'idle';
    unlockOrientation();
    updateRecUI();
  }

  function updateRecUI() {
    // 'starting' looks identical to 'recording' (so the button gives instant
    // visual feedback) but taps are ignored until the encoder has actually begun.
    const visualState = recordingState === 'starting' ? 'recording' : recordingState;

    recMainBtn.classList.remove('state-idle', 'state-recording', 'state-paused');
    recMainBtn.classList.add('state-' + visualState);

    if (recordingState === 'idle') {
      recIcon.innerHTML = '';
    } else if (visualState === 'recording') {
      recIcon.innerHTML = '&#10074;&#10074;'; // pause icon: tap to pause
    } else {
      recIcon.innerHTML = '&#9654;'; // play icon: tap to resume
    }

    finishBtn.disabled = (recordingState === 'idle' || recordingState === 'starting');
    finishBtn.classList.toggle('ready', recordingState === 'recording' || recordingState === 'paused');

    recBadge.classList.toggle('live', recordingState !== 'idle');
    recBadge.classList.toggle('paused', recordingState === 'paused');
    recDot.classList.toggle('blink', visualState === 'recording');
    recLabel.textContent = recordingState === 'paused' ? 'PAUSED' : 'REC';
  }

  function onRecordingStopped() {
    const buggyBlob = new Blob(recordedChunks, { type: 'video/webm' });

    const useBlob = (blob) => {
      if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
      lastBlobUrl = URL.createObjectURL(blob);
      resultVideo.src = lastBlobUrl;
      resultOverlay.classList.add('show');
      window.__lastBlob = blob;
    };

    if (window.ysFixWebmDuration && lastRecordingDurationMs > 0) {
      try {
        window.ysFixWebmDuration(buggyBlob, lastRecordingDurationMs, { logger: false })
          .then(useBlob)
          .catch(() => useBlob(buggyBlob));
      } catch (e) {
        useBlob(buggyBlob);
      }
    } else {
      // Library didn't load (e.g. offline) or duration wasn't tracked — still
      // usable, just without a working seek bar in some players.
      useBlob(buggyBlob);
    }
  }

  recMainBtn.addEventListener('click', () => {
    if (recordingState === 'idle') startRecording();
    else if (recordingState === 'recording') pauseRecording();
    else if (recordingState === 'paused') resumeRecording();
  });
  finishBtn.addEventListener('click', finishRecording);

  // ---------- Result screen actions ----------

  // Steps the played-back result video roughly one frame at a time, so you
  // can land precisely on the moment someone crosses and read the burned-in
  // clock directly off that frame. This is an approximation (1/30s steps,
  // matching our capture rate) rather than a guaranteed exact frame index —
  // browsers don't expose true frame-stepping, only currentTime seeking.
  const FRAME_STEP_SEC = 1 / 30;
  function stepResultFrame(direction) {
    if (!isFinite(resultVideo.duration)) return;
    resultVideo.pause();
    const t = resultVideo.currentTime + direction * FRAME_STEP_SEC;
    resultVideo.currentTime = Math.max(0, Math.min(resultVideo.duration, t));
  }
  prevFrameBtn.addEventListener('click', () => stepResultFrame(-1));
  nextFrameBtn.addEventListener('click', () => stepResultFrame(1));

  // Drag left/right anywhere on the video to scrub, and a plain tap
  // toggles play/pause — replacing the native controls bar, which sat
  // right over the burned-in clock.
  const DRAG_SECONDS_PER_PIXEL = 0.012; // ~12ms of video per pixel dragged
  const TAP_MOVE_THRESHOLD = 6; // px — under this, treat it as a tap, not a drag
  let scrubStartX = 0;
  let scrubStartTime = 0;
  let scrubMoved = false;
  let lastTouchActivity = 0; // guards against the "ghost" mouse events touchscreens fire after a real touch

  function scrubDragStart(clientX) {
    scrubStartX = clientX;
    scrubStartTime = resultVideo.currentTime;
    scrubMoved = false;
  }
  function scrubDragMove(clientX) {
    if (!isFinite(resultVideo.duration)) return;
    const dx = clientX - scrubStartX;
    if (Math.abs(dx) > TAP_MOVE_THRESHOLD) scrubMoved = true;
    if (!scrubMoved) return;
    resultVideo.pause();
    const t = scrubStartTime + dx * DRAG_SECONDS_PER_PIXEL;
    resultVideo.currentTime = Math.max(0, Math.min(resultVideo.duration, t));
  }
  function scrubDragEnd() {
    if (!scrubMoved) {
      if (resultVideo.paused) resultVideo.play().catch(() => {});
      else resultVideo.pause();
    }
  }

  resultVideoWrap.addEventListener('touchstart', e => {
    lastTouchActivity = Date.now();
    scrubDragStart(e.touches[0].clientX);
  }, { passive: true });
  resultVideoWrap.addEventListener('touchmove', e => {
    lastTouchActivity = Date.now();
    scrubDragMove(e.touches[0].clientX);
  }, { passive: true });
  resultVideoWrap.addEventListener('touchend', () => {
    lastTouchActivity = Date.now();
    scrubDragEnd();
  });

  // Mouse handlers exist for desktop testing only — on a touchscreen, the
  // browser also fires a synthesized "ghost" mousedown/mouseup shortly after
  // every real touch for backward compatibility. Without this guard, a
  // single tap would toggle play/pause twice (once from touch, once from
  // the ghost mouse event right after), which is exactly why it took a
  // couple of taps to actually get the video playing.
  let mouseScrubbing = false;
  resultVideoWrap.addEventListener('mousedown', e => {
    if (Date.now() - lastTouchActivity < 800) return;
    mouseScrubbing = true;
    scrubDragStart(e.clientX);
  });
  window.addEventListener('mousemove', e => {
    if (mouseScrubbing) scrubDragMove(e.clientX);
  });
  window.addEventListener('mouseup', () => {
    if (mouseScrubbing) { scrubDragEnd(); mouseScrubbing = false; }
  });

  resultVideo.addEventListener('play', () => { bigPlayBtn.classList.add('hidden'); });
  resultVideo.addEventListener('pause', () => { bigPlayBtn.classList.remove('hidden'); });

  function makeVideoFile() {
    const blob = window.__lastBlob;
    if (!blob) return null;
    return new File([blob], `stopwatch-video-${Date.now()}.webm`, { type: 'video/webm' });
  }

  async function shareFile() {
    const file = makeVideoFile();
    if (!file) return false;
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: 'Race video' });
        return true;
      } catch (e) {
        return false; // user cancelled — not an error
      }
    }
    return false;
  }

  shareBtn.addEventListener('click', async () => {
    const file = makeVideoFile();
    if (!file) return;
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await shareFile();
    } else {
      downloadBlob(); // no share support at all on this browser — fall back to a direct download
    }
  });

  downloadBtn.addEventListener('click', async () => {
    if (isIOS()) {
      // iOS Safari doesn't reliably support direct blob downloads for video —
      // the share sheet (choose "Save Video") is the actual way to save on iPhone/iPad.
      const shared = await shareFile();
      if (!shared) {
        alert('Tap Share instead, then choose "Save Video" to save it to Photos.');
      }
      return;
    }
    downloadBlob();
  });

  function downloadBlob() {
    const blob = window.__lastBlob;
    if (!blob) return;
    const a = document.createElement('a');
    a.href = lastBlobUrl;
    a.download = `stopwatch-video-${Date.now()}.webm`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  discardBtn.addEventListener('click', () => {
    resultOverlay.classList.remove('show');
    resultVideo.pause();
    resultVideo.removeAttribute('src');
    recordedChunks = [];
  });

  // ---------- PWA install prompt ----------

  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'block';
  });
  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.style.display = 'none';
  });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }

  updateRecUI();
})();
</script>
</body>
</html>
