



<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#161513">
<title>Stopwatch Video</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/fix-webm-duration@1.0.6/fix-webm-duration.js"></script>
<style>
  :root{
    --track-red:#c1272d;
    --ink:#161513;
    --paper:#f4f1ea;
    --mono: ui-monospace, 'SF Mono', 'Roboto Mono', Menlo, Monaco, Consolas, monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0;padding:0;
    width:100%;height:100%;
    background:#000;
    overflow:hidden;
    font-family:var(--mono);
    color:var(--paper);
    user-select: none;
    -webkit-user-select: none;
  }
  #stage{
    position:fixed;inset:0;
    display:flex;align-items:center;justify-content:center;
    background:#000;
  }
  video{display:none;}
  canvas{
    max-width:100%;max-height:100%;
    width:auto;height:auto;
    display:block;
  }

  #permOverlay{
    position:fixed;inset:0;
    background:var(--ink);
    color:var(--paper);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:32px;
    z-index:50;
  }
  #permOverlay h1{font-size:20px;margin:0 0 12px;}
  #permOverlay p{font-size:14px;line-height:1.6;color:#c9c4b8;max-width:44ch;margin:0 0 20px;}
  #permOverlay button{
    font-family:var(--mono);
    font-size:14px;letter-spacing:.05em;text-transform:uppercase;
    background:var(--track-red);color:var(--paper);
    border:none;border-radius:6px;
    padding:14px 26px;
    cursor:pointer;
  }
  #permOverlay.hidden{display:none;}

  #topBar{
    position:fixed;top:0;left:0;right:0;
    display:flex;justify-content:space-between;align-items:center;
    padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
    background:linear-gradient(rgba(0,0,0,.55),transparent);
    z-index:20;
  }
  .iconBtn{
    width:44px;height:44px;
    border-radius:50%;
    border:none;
    background:rgba(0,0,0,.35);
    color:var(--paper);
    font-size:20px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .iconBtn:active{background:rgba(193,39,45,.6);}

  #badgeContainer{
    display:flex;
    align-items:center;
    gap:6px;
  }
  #recBadge{
    font-size:12px;letter-spacing:.08em;
    padding:6px 12px;border-radius:20px;
    background:rgba(0,0,0,.4);
    display:flex;align-items:center;gap:6px;
    visibility:hidden;
  }
  #recBadge.live{visibility:visible;}
  #recDot{width:9px;height:9px;border-radius:50%;background:var(--track-red);}
  #recBadge.paused #recDot{background:#c9a227;}
  #recDot.blink{animation:blink 1s infinite;}
  @keyframes blink{50%{opacity:.25;}}

  #bottomBar{
    position:fixed;bottom:0;left:0;right:0;
    display:flex;flex-direction:column;align-items:center;gap:14px;
    padding:14px 18px calc(20px + env(safe-area-inset-bottom));
    background:linear-gradient(transparent,rgba(0,0,0,.6));
    z-index:20;
  }
  #clockRow{
    display:flex;align-items:center;gap:10px;justify-content:center;flex-wrap:wrap;
  }
  .pillBtn{
    font-family:var(--mono);
    font-size:13px;letter-spacing:.05em;text-transform:uppercase;
    border:1px solid rgba(244,241,234,.4);
    background:rgba(0,0,0,.35);
    color:var(--paper);
    border-radius:24px;
    padding:10px 18px;
    cursor:pointer;
  }
  .pillBtn.active{background:var(--track-red);border-color:var(--track-red);}
  .pillBtn:disabled{opacity:.35;}

  .smallBtn{
    width:40px;height:40px;border-radius:50%;
    border:1px solid rgba(244,241,234,.4);
    background:rgba(0,0,0,.35);
    color:var(--paper);
    font-size:15px;
    cursor:pointer;
  }
  .smallBtn:disabled{opacity:.3;}

  #recRow{
    display:flex;align-items:center;gap:26px;
  }
  #recMainBtn{
    width:76px;height:76px;border-radius:50%;
    border:4px solid var(--paper);
    background:var(--track-red);
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    padding:0;
  }
  #recMainBtn #recIcon{
    font-size:22px;
    line-height:1;
    color:var(--paper);
  }
  #recMainBtn.state-paused{background:#c9a227;}
  #recMainBtn.state-recording #recIcon{color:var(--track-red);}
  #recMainBtn.state-recording{background:var(--paper);}
  #finishBtn{
    font-family:var(--mono);
    font-size:12px;letter-spacing:.05em;text-transform:uppercase;
    width:56px;height:56px;border-radius:50%;
    border:1px solid rgba(244,241,234,.4);
    background:rgba(0,0,0,.35);
    color:var(--paper);
    cursor:pointer;
  }
  #finishBtn:disabled{opacity:.3;}
  #finishBtn.ready{background:#2f9e44;border-color:#2f9e44;}

  #resultOverlay{
    position:fixed;inset:0;
    background:var(--ink);
    display:none;
    flex-direction:column;
    z-index:40;
    overflow-y:auto;
  }
  #resultOverlay.show{display:flex;}

  /* In landscape, split into side-by-side: video left, controls right */
  @media (orientation:landscape) {
    #resultOverlay.show {
      flex-direction:row;
      overflow:hidden;
    }
    #resultLeft {
      display:flex;
      flex-direction:column;
      flex:1;
      min-width:0;
      overflow:hidden;
    }
    #resultRight {
      width:260px;
      flex-shrink:0;
      display:flex;
      flex-direction:column;
      overflow-y:auto;
      border-left:1px solid #2c2a27;
    }
  }
  @media (orientation:portrait) {
    #resultLeft { display:contents; }
    #resultRight { display:contents; }
  }
  
  #resultDisplayContainer {
    position:relative;
    width:100%;
    max-height:55vh;
    background:#000;
    overflow:hidden;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  @media (orientation:landscape) {
    #resultDisplayContainer {
      max-height:none;
      flex:1;
    }
  }
  #resultCanvas {
    display:block;
    max-width:100%;
    max-height:55vh;
    width:auto;
    height:auto;
    object-fit:contain;
  }
  @media (orientation:landscape) {
    #resultCanvas {
      max-height:100%;
    }
  }

  #progressBarContainer {
    position:relative;
    width:100%;
    height:28px;
    background:#0a0908;
    cursor:pointer;
    flex-shrink:0;
    display:flex;
    align-items:center;
  }
  #progressBarFill {
    height:4px;
    background:var(--track-red);
    width:0%;
    pointer-events:none;
    transition:width 0.1s linear;
  }
  #progressTimeLabel {
    position:absolute;
    right:8px;
    font-size:11px;
    color:rgba(244,241,234,.5);
    font-family:var(--mono);
    pointer-events:none;
  }

  #frameStepBar{
    padding:10px 14px;
    display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;
    background:var(--ink);
    border-bottom:1px solid #2c2a27;
  }
  .frameBtn{
    font-family:var(--mono);
    font-size:11px;
    background:transparent;
    color:var(--paper);
    border:1px solid rgba(244,241,234,.3);
    border-radius:16px;
    padding:6px 12px;
    cursor:pointer;
  }
  .frameBtn:active, .frameBtn.activeSpeed{background:var(--track-red);border-color:var(--track-red);}
  
  #inlinePlayPauseBtn {
    background: var(--paper);
    color: var(--ink);
    font-weight: bold;
    border-color: var(--paper);
  }

  #resultsDataContainer {
    flex:1;
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:12px;
    background:#1c1b18;
  }
  #markingRow {
    display:flex;
    gap:8px;
    justify-content:center;
    flex-wrap:wrap;
  }
  #takeSplitBtn {
    flex:1.5;
    background:#2f9e44;
    color:#fff;
    border:none;
    font-family:var(--mono);
    font-size:13px;
    font-weight:bold;
    text-transform:uppercase;
    padding:12px;
    border-radius:6px;
    cursor:pointer;
  }
  #takeSplitBtn:active { background:#247a35; }
  
  .syncActionBtn {
    flex:1;
    background:rgba(0,0,0,0.4);
    color:var(--paper);
    border:1px solid rgba(244,241,234,.4);
    font-family:var(--mono);
    font-size:12px;
    padding:12px 10px;
    border-radius:6px;
    cursor:pointer;
  }
  #flashZeroBtn { background:#1098ad; border-color:#1098ad; color:#fff; }

  #tableWrapper {
    flex:1;
    max-height:180px;
    overflow-y:auto;
    border:1px solid #383530;
    border-radius:6px;
    background:var(--ink);
  }
  table {
    width:100%;
    border-collapse:collapse;
    font-size:13px;
    text-align:left;
  }
  th, td {
    padding:8px 12px;
    border-bottom:1px solid #2c2a27;
  }
  th { background:#22211e; color:#c9c4b8; font-weight:normal; }
  .deleteRowBtn {
    background:transparent;
    color:var(--track-red);
    border:none;
    cursor:pointer;
    font-size:14px;
    padding:0 4px;
  }

  #resultBar{
    padding:10px 14px calc(14px + env(safe-area-inset-bottom));
    display:flex;gap:8px;flex-wrap:wrap;
    justify-content:center;
    background:var(--ink);
    border-top:1px solid #2c2a27;
  }
  #resultBar button{
    font-family:var(--mono);
    font-size:12px;letter-spacing:.03em;text-transform:uppercase;
    border:none;border-radius:6px;
    padding:10px 14px;
    cursor:pointer;
  }
  #exportCsvBtn{background:#1c7ed6;color:#fff;}
  #burnSmoothBtn{background:#e03131;color:#fff;font-weight:bold;}
  #downloadBtn{background:var(--paper);color:var(--ink);}
  #discardBtn{background:transparent;color:#c9c4b8;border:1px solid #4a4640 !important;}

  #zoomIndicator{
    position:fixed;top:50%;left:50%;
    transform:translate(-50%,-50%);
    font-family:var(--mono);font-weight:700;font-size:22px;
    background:rgba(0,0,0,.5);color:var(--paper);
    padding:10px 18px;border-radius:14px;
    z-index:30;opacity:0;pointer-events:none;
    transition:opacity .15s ease;
  }
  #zoomIndicator.show{opacity:1;}

  /* Scrub speed indicator — bottom center of review video */
  #scrubIndicator{
    position:absolute;bottom:10px;left:50%;
    transform:translateX(-50%);
    font-family:var(--mono);font-weight:700;font-size:14px;
    background:rgba(0,0,0,.65);color:var(--paper);
    padding:6px 14px;border-radius:10px;
    opacity:0;pointer-events:none;
    transition:opacity .1s ease;
    white-space:nowrap;
    z-index:5;
  }
  #scrubIndicator.show{opacity:1;}

  #installBtn{
    position:fixed;top:calc(10px + env(safe-area-inset-top));left:50%;
    transform:translateX(-50%);display:none;
    font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;
    background:var(--track-red);color:var(--paper);
    border:none;border-radius:20px;padding:8px 16px;z-index:25;
  }
  #importBtnRow {
    position:absolute;top:calc(12px + env(safe-area-inset-top));left:14px;z-index:25;
  }
</style>
</head>
<body>

<div id="stage">
  <video id="video" playsinline muted autoplay style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;"></video>
  <canvas id="canvas" style="width:100%;height:100%;object-fit:contain;"></canvas>
</div>

<button id="installBtn">Install app</button>

<div id="permOverlay">
  <h1>Stopwatch Video</h1>
  <p>Needs access to your camera and microphone to track run splits and identify starting audio cues automatically.</p>
  <button id="permBtn">Enable camera</button>
  <p id="permError" style="color:#e78a8e;margin-top:16px;"></p>
</div>

<div id="importBtnRow">
  <button id="loadVideoBtn" class="pillBtn" style="font-size:11px; padding:6px 12px; background:rgba(0,0,0,0.65);">Upload External Video</button>
  <input type="file" id="videoFileInput" accept="video/*" style="display:none;">
</div>

<div id="topBar">
  <div style="width:130px;"></div> 
  <div id="badgeContainer">
    <div id="recBadge"><span id="recDot"></span><span id="recLabel">REC</span></div>
  </div>
  <button id="flipBtn" class="iconBtn">&#8635;</button>
</div>

<div id="zoomIndicator"></div>

<div id="bottomBar">
  <div id="clockRow">
    <button id="resetClockBtn" class="smallBtn" disabled>&#8634;</button>
    <button id="clockBtn" class="pillBtn">Start clock</button>
    <button id="offsetStartBtn" class="pillBtn">Offset Start</button>
    <button id="lapBtn" class="pillBtn">Lap</button>
  </div>
  <div id="recRow">
    <div style="width:56px;"></div>
    <button id="recMainBtn"><span id="recIcon"></span></button>
    <button id="finishBtn" disabled>Finish</button>
  </div>
</div>

<div style="position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;overflow:hidden;pointer-events:none;" aria-hidden="true">
  <video id="resultVideo" playsinline preload="auto"></video>
</div>

<div id="resultOverlay">
  <div id="resultLeft">
    <div id="resultDisplayContainer">
      <canvas id="resultCanvas"></canvas>
      <div id="scrubIndicator"></div>
    </div>
    <div id="progressBarContainer">
      <div id="progressBarFill"></div>
      <div id="progressTimeLabel"></div>
    </div>
    <div id="frameStepBar">
      <button id="inlinePlayPauseBtn" class="frameBtn">PLAY</button>
      <span style="color:rgba(244,241,234,.3);padding:0 2px;">|</span>
      <button id="back5Btn" class="frameBtn">&#171;5</button><button id="prevFrameBtn" class="frameBtn">&#9664;1</button><button id="nextFrameBtn" class="frameBtn">1&#9654;</button><button id="fwd5Btn" class="frameBtn">5&#187;</button>
      <span style="color:rgba(244,241,234,.3);padding:0 2px;">|</span>
      <button id="speed1x" class="frameBtn speed activeSpeed" data-speed="1">1x</button><button id="speedSlow" class="frameBtn speed" data-speed="0.1">0.1x</button>
    </div>
  </div>

  <div id="resultRight">
    <div id="resultsDataContainer">
      <div id="markingRow">
        <button id="flashZeroBtn" class="syncActionBtn" title="Set this specific frame as race zero">Set Gun Flash (0.00)</button>
        <button id="syncVideoBtn" class="syncActionBtn">Manual Sync</button>
        <button id="takeSplitBtn">Take Split</button>
      </div>
      <div id="tableWrapper">
        <table id="resultsTable">
          <thead>
            <tr>
              <th style="width: 50px;">Place</th>
              <th style="width: 80px;">Time</th>
              <th>Notes</th>
              <th style="width: 40px; text-align: center;"></th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
      </div>
    </div>

    <div id="resultBar">
      <button id="exportCsvBtn">Export CSV</button>
      <button id="burnSmoothBtn">Share Video</button>
      <button id="downloadBtn" style="display:none;">Download Video</button>
      <button id="discardBtn">Discard</button>
    </div>
  </div>
</div>

<script>
(function(){
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  const permOverlay = document.getElementById('permOverlay');
  const permBtn = document.getElementById('permBtn');
  const permError = document.getElementById('permError');
  const flipBtn = document.getElementById('flipBtn');
  const recBadge = document.getElementById('recBadge');
  const recDot = document.getElementById('recDot');
  const recLabel = document.getElementById('recLabel');
  const zoomIndicator = document.getElementById('zoomIndicator');

  const clockBtn = document.getElementById('clockBtn');
  const resetClockBtn = document.getElementById('resetClockBtn');
  const lapBtn = document.getElementById('lapBtn');
  const recMainBtn = document.getElementById('recMainBtn');
  const recIcon = document.getElementById('recIcon');
  const finishBtn = document.getElementById('finishBtn');

  const loadVideoBtn = document.getElementById('loadVideoBtn');
  const videoFileInput = document.getElementById('videoFileInput');

  const resultOverlay = document.getElementById('resultOverlay');
  const resultVideo = document.getElementById('resultVideo');
  const resultCanvas = document.getElementById('resultCanvas');
  const rCtx = resultCanvas.getContext('2d');
  const resultDisplayContainer = document.getElementById('resultDisplayContainer');
  
  const inlinePlayPauseBtn = document.getElementById('inlinePlayPauseBtn');
  const prevFrameBtn=document.getElementById('prevFrameBtn');const nextFrameBtn=document.getElementById('nextFrameBtn');const back5Btn=document.getElementById('back5Btn');const fwd5Btn=document.getElementById('fwd5Btn');
  const downloadBtn = document.getElementById('downloadBtn');
  const discardBtn = document.getElementById('discardBtn');
  const takeSplitBtn = document.getElementById('takeSplitBtn');
  const syncVideoBtn = document.getElementById('syncVideoBtn');
  const flashZeroBtn = document.getElementById('flashZeroBtn');
  const resultsBody = document.getElementById('resultsBody');
  const exportCsvBtn = document.getElementById('exportCsvBtn');

  let facingMode = 'environment';
  let cameraStream = null;
  let zoomTrack = null;
  let zoomCaps = null;      
  let digitalZoomFactor = 1; 
  let audioTrack = null;
  let wakeLock = null;

  let clockRunning = false;
  let clockElapsedMs = 0;
  let clockStartPerf = 0; 
  let lastLapMarkMs = 0; 
  let lapUsed = false;

  // --- Persistence ---
  const LS_KEY = 'svp_clock';
  function saveClock() {
    try {
      localStorage.setItem(LS_KEY, JSON.stringify({
        running: clockRunning,
        elapsedMs: clockElapsedMs,
        wallStart: clockRunning ? Date.now() - clockElapsedMs : null,
        lastLapMarkMs,
        lapUsed,
        finishersList,
        savedAt: Date.now()
      }));
    } catch(e) {}
  }
  function restoreClock() {
    try {
      const saved = JSON.parse(localStorage.getItem(LS_KEY));
      if (!saved) return;
      // Expire after 1 hour of inactivity
      if (saved.savedAt && (Date.now() - saved.savedAt) > 60 * 60 * 1000) {
        localStorage.removeItem(LS_KEY);
        return;
      }
      finishersList = saved.finishersList || [];
      lastLapMarkMs = saved.lastLapMarkMs || 0;
      lapUsed = saved.lapUsed || false;
      if (saved.running && saved.wallStart) {
        clockElapsedMs = Date.now() - saved.wallStart;
        clockStartPerf = Date.now();
        clockRunning = true;
        clockBtn.textContent = 'Stop clock'; clockBtn.classList.add('active'); resetClockBtn.disabled = true;
      } else {
        clockElapsedMs = saved.elapsedMs || 0;
        clockRunning = false;
        if (clockElapsedMs > 0) resetClockBtn.disabled = false;
      }
      if (finishersList.length > 0) renderResultsTable();
      // Re-save immediately so the 1-hour expiry window restarts from THIS
      // open, not from the last button press. Without this, a clock started
      // at a meet would silently expire an hour after the start gun even if
      // the app had been reopened several times since — reopening the app
      // is activity too.
      saveClock();
    } catch(e) {}
  }
  
  let recorder = null;
  let recordingState = 'idle'; 
  let recordedChunks = [];
  let lastBlobUrl = null;
  let recordingActiveMs = 0;      
  let activeSegmentStart = 0;     
  let lastRecordingDurationMs = 0;
  
  let videoTimelineMap = [];
  let finishersList = [];
  let isImportedVideoMode = false;
  let isVideoSynced = false; // Tracks if user has set standard or custom alignment reference
  let currentSyncLabelString = "0.00";
  let reviewLoopId = null;
  let drawLoopActive = true;

  function currentActiveDurationMs() {
    return recordingActiveMs + (recordingState === 'recording' ? performance.now() - activeSegmentStart : 0);
  }

  async function requestWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
  }

  // Wake locks are AUTOMATICALLY released by the browser whenever the page
  // loses visibility — switching apps, a phone call, pulling down the
  // notification shade. Without re-acquiring on return, the screen could
  // sleep mid-race, which freezes the draw loop and ruins the recording.
  // Re-request every time the app becomes visible again.
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && cameraStream) requestWakeLock();
  });

  // Pick the best recording container this browser supports. MP4 (H.264 +
  // AAC) is preferred whenever available: it plays everywhere the videos
  // get shared — iMessage, iPhone camera rolls, social apps — while WebM
  // won't open for iPhone recipients at all. Recording to MP4 is just as
  // fast as WebM (both use the phone's hardware encoder in real time; no
  // conversion step). The explicit avc1+mp4a codec string is checked first
  // because it guarantees iPhone-compatible audio; plain 'video/mp4' could
  // silently pick an audio codec iMessage can't play. WebM remains the
  // fallback for browsers that can't record MP4 (mostly older Chrome).
  // Detect once; use everywhere: recorder config, blob type, file extension.
  function pickRecorderFormat() {
    const candidates = [
      { mime: 'video/mp4;codecs=avc1.42E01E,mp4a.40.2', blobType: 'video/mp4', ext: 'mp4' },
      { mime: 'video/webm;codecs=vp9', blobType: 'video/webm', ext: 'webm' },
      { mime: 'video/webm',            blobType: 'video/webm', ext: 'webm' },
      { mime: 'video/mp4',             blobType: 'video/mp4', ext: 'mp4' },
    ];
    if (window.MediaRecorder && MediaRecorder.isTypeSupported) {
      for (const c of candidates) if (MediaRecorder.isTypeSupported(c.mime)) return c;
    }
    // Unknown browser: let it pick its own default container.
    return { mime: '', blobType: 'video/webm', ext: 'webm' };
  }
  const REC_FORMAT = pickRecorderFormat();


  async function startCamera() {
    if (!window.isSecureContext) {
      permError.textContent = 'HTTPS is required for functionality.';
      return;
    }
    try {
      const isLandscape = window.innerWidth >= window.innerHeight;
      const targetAspect = isLandscape ? 16 / 9 : 9 / 16;
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode,
          aspectRatio: { ideal: targetAspect },
          width: { ideal: isLandscape ? 1920 : 1080 },
          height: { ideal: isLandscape ? 1080 : 1920 },
          frameRate: { ideal: 60 },
          zoom: true
        },
        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
      });
      cameraStream = stream;
      audioTrack = stream.getAudioTracks()[0] || null;
      zoomTrack = stream.getVideoTracks()[0] || null;
      if (zoomTrack && zoomTrack.getCapabilities) {
        try { const caps = zoomTrack.getCapabilities(); if(caps.zoom) zoomCaps = caps.zoom; } catch(e){}
      }
      video.srcObject = stream;
      await new Promise(resolve => {
        if (video.readyState >= 1) { resolve(); return; }
        video.addEventListener('loadedmetadata', resolve, { once: true });
      });
      await video.play();
      permOverlay.classList.add('hidden');
      // Wait until the browser reports real dimensions (not 0×0)
      await new Promise(resolve => {
        const check = () => {
          if (video.videoWidth > 0 && video.videoHeight > 0) { resolve(); return; }
          requestAnimationFrame(check);
        };
        check();
      });
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      requestWakeLock();
      // Request landscape lock where supported (Chrome Android)
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(() => {});
      }
      restoreClock();
      requestAnimationFrame(drawLoop);
    } catch (err) {
      permError.textContent = 'Could not access peripherals: ' + err.name;
    }
  }

  function currentClockMs() { return clockElapsedMs + (clockRunning ? Date.now() - clockStartPerf : 0); }
  function currentLapMs() { return Math.max(0, currentClockMs() - lastLapMarkMs); }

  function formatClock(ms) {
    const isNegative = ms < 0;
    const absoluteMs = Math.abs(ms);
    const totalSec = absoluteMs / 1000;
    const m = Math.floor(totalSec / 60);
    const s = totalSec - m * 60;
    const sign = isNegative ? '-' : '';
    if (m === 0) return sign + s.toFixed(1);
    return `${sign}${m}:${s.toFixed(1).padStart(4, '0')}`;
  }

  function parseClockToMs(inputStr) {
    if (!inputStr) return 0;
    inputStr = inputStr.trim();
    let isNegative = inputStr.startsWith('-');
    if (isNegative) inputStr = inputStr.substring(1).trim();
    let calculatedMs = 0;
    if (inputStr.includes(':')) {
      const parts = inputStr.split(':');
      calculatedMs = Math.round(((parseFloat(parts[0])||0)*60 + (parseFloat(parts[1])||0))*1000);
    } else {
      calculatedMs = Math.round((parseFloat(inputStr)||0)*1000);
    }
    return isNegative ? -calculatedMs : calculatedMs;
  }

  function startClockNow() {

    saveClock();
  }

  function stopClockNow() {
    if (!clockRunning) return;

    saveClock();

  let pinchActive = false, pinchStartDist = 0, pinchStartZoomValue = 1;
  document.getElementById('stage').addEventListener('touchstart', e => {
    if (e.touches.length === 2) {

      pinchStartDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      pinchStartZoomValue = zoomCaps ? (zoomTrack.getSettings().zoom || zoomCaps.min) : digitalZoomFactor;
    }
  }, { passive: true });
  document.getElementById('stage').addEventListener('touchmove', e => {
    if (pinchActive && e.touches.length === 2) {
      e.preventDefault();
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const ratio = dist / pinchStartDist; const target = pinchStartZoomValue * ratio;
      if (zoomCaps) {
        const clamped = Math.min(zoomCaps.max, Math.max(zoomCaps.min, target));
        zoomTrack.applyConstraints({ advanced: [{ zoom: clamped }] }).catch(() => {});
        zoomIndicator.textContent = clamped.toFixed(1) + 'x';

        digitalZoomFactor = Math.min(4, Math.max(1, target));

  // Battery: requestAnimationFrame fires at the DISPLAY's refresh rate —
  // 120/sec on ProMotion iPhones and many newer Androids. That meant
  // compositing full-resolution video frames at up to 120fps even while
  // idly waiting for a race to start. The recording only ever samples the
  // canvas at 60fps, so anything above that is pure wasted power. Cap:
  // ~30fps while idle (plenty smooth for a preview + running clock),
  // ~60fps while actually recording. The thresholds (30ms/15ms) divide
  // evenly into both 60Hz and 120Hz frame intervals, so pacing stays
  // clean on either kind of display.
  let lastDrawTs = 0;
  function drawLoop(ts) {
    if (!drawLoopActive) return;
    const minInterval = recordingState === 'recording' ? 15 : 30;
    if (ts !== undefined && ts - lastDrawTs < minInterval) {
      requestAnimationFrame(drawLoop);
      return;
    }
    lastDrawTs = ts || 0;
    if (video.readyState >= 2) {
      if (!zoomCaps && digitalZoomFactor > 1) {
        const sw = video.videoWidth / digitalZoomFactor, sh = video.videoHeight / digitalZoomFactor;
        ctx.drawImage(video, (video.videoWidth-sw)/2, (video.videoHeight-sh)/2, sw, sh, 0, 0, canvas.width, canvas.height);
      } else {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      }
      const fSize = Math.round(canvas.width * 0.045);
      ctx.font = `700 ${fSize}px ui-monospace, monospace`;
      ctx.lineJoin = 'round'; ctx.lineWidth = fSize * 0.15; ctx.strokeStyle = 'rgba(0,0,0,0.8)';
      
      const txt = formatClock(currentClockMs());
      ctx.strokeText(txt, fSize * 0.5, canvas.height - fSize * 0.5);
      // Always off-white regardless of clock state. The gold colour when
      // paused looked fine on the live preview but got baked into the
      // recording — the review overlay then drew white text on top of the
      // gold pixels, producing the visible "ghost" behind the white timer.
      ctx.fillStyle = '#f4f1ea';
      ctx.fillText(txt, fSize * 0.5, canvas.height - fSize * 0.5);

      if (lapUsed) {
        const lapTxt = formatClock(currentLapMs());
        ctx.font = `700 ${Math.round(fSize*0.6)}px ui-monospace, monospace`;
        ctx.strokeText(lapTxt, fSize * 0.5, canvas.height - fSize * 1.8);
        ctx.fillStyle = '#f4f1ea'; ctx.fillText(lapTxt, fSize * 0.5, canvas.height - fSize * 1.8);
      }
    }
    requestAnimationFrame(drawLoop);
  }

  loadVideoBtn.addEventListener('click', () => videoFileInput.click());
  
  videoFileInput.addEventListener('change', (e) => {
    const file = e.target.files[0]; if (!file) return;
    uploadedVideoName = file.name;
    if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
    lastBlobUrl = URL.createObjectURL(file);

    // Stop the live camera so it doesn't compete with the uploaded video decode
    drawLoopActive = false;
    if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
    audioTrack = null;

    resultVideo.pause();
    inlinePlayPauseBtn.textContent = 'PLAY';
    resultVideo.src = lastBlobUrl;
    
    resultVideo.onloadedmetadata = () => {

      resultCanvas.height = resultVideo.videoHeight || 720;

      isImportedVideoMode = true; 
      isVideoSynced = false; // Lock clock presentation to 0.00 until synced

      resultOverlay.classList.add('show');

  function startReviewRenderLoop() {
    if (!reviewLoopId) {
      const render = () => {
        drawReviewFrame();
        if (!resultVideo.paused && !resultVideo.ended) {
          reviewLoopId = requestAnimationFrame(render);
        } else {
          reviewLoopId = null;
        }
      };
      reviewLoopId = requestAnimationFrame(render);
    }
  }

  const progressBarContainer = document.getElementById('progressBarContainer');
  const progressBarFill = document.getElementById('progressBarFill');
  const progressTimeLabel = document.getElementById('progressTimeLabel');

  function updateProgressBar() {
    if (!resultVideo.duration) return;
    const pct = (resultVideo.currentTime / resultVideo.duration) * 100;
    progressBarFill.style.width = pct + '%';
    // Show current time / total
    const fmt = s => {
      const m = Math.floor(s / 60);
      const sec = (s - m * 60).toFixed(1).padStart(4, '0');
      return m > 0 ? `${m}:${sec}` : sec + 's';
    };
    progressTimeLabel.textContent = fmt(resultVideo.currentTime) + ' / ' + fmt(resultVideo.duration);
  }

  // Tap or drag on progress bar to seek
  function seekFromProgressEvent(e) {
    const rect = progressBarContainer.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    resultVideo.currentTime = pct * resultVideo.duration;
    updateProgressBar();
  }
  progressBarContainer.addEventListener('click', seekFromProgressEvent);
  progressBarContainer.addEventListener('touchstart', seekFromProgressEvent, { passive: true });
  progressBarContainer.addEventListener('touchmove', e => {
    e.stopPropagation();
    seekFromProgressEvent(e);
  }, { passive: true });

  resultVideo.addEventListener('timeupdate', () => { drawReviewFrame(); updateProgressBar(); });
  resultVideo.addEventListener('seeked', () => { drawReviewFrame(); updateProgressBar(); });
  
  resultVideo.addEventListener('play', () => {
    inlinePlayPauseBtn.textContent = 'PAUSE';
    startReviewRenderLoop();
  });
  
  resultVideo.addEventListener('pause', () => {
    inlinePlayPauseBtn.textContent = 'PLAY';
    if (reviewLoopId) {
      cancelAnimationFrame(reviewLoopId);
      reviewLoopId = null;
    }
    drawReviewFrame();
  });

  function getCalculatedRaceTimeMs() {
    // If it's an uploaded external video and hasn't been mapped yet, force 0
    if (isImportedVideoMode && !isVideoSynced) {
      return 0;
    }
    const vMs = resultVideo.currentTime * 1000;
    let seg = videoTimelineMap[0] || { videoStart: 0, raceStart: 0 };
    for (let i = 0; i < videoTimelineMap.length; i++) {
      if (vMs >= videoTimelineMap[i].videoStart) seg = videoTimelineMap[i];
    }
    return seg.raceStart + (vMs - seg.videoStart);
  }

  function drawReviewFrame() {
    if (resultVideo.readyState >= 1) {
      rCtx.drawImage(resultVideo, 0, 0, resultCanvas.width, resultCanvas.height);

      // If reviewing your own recorded footage the clock is already burned in.
      if (isVideoSynced) {
        const fSize = Math.round(resultCanvas.width * 0.045);
        rCtx.font = `700 ${fSize}px ui-monospace, monospace`;
        rCtx.lineJoin = 'round'; rCtx.lineWidth = fSize * 0.15; rCtx.strokeStyle = 'rgba(0,0,0,0.8)';
        
        const calculatedMs = Math.max(0, getCalculatedRaceTimeMs());
        const txt = formatClock(calculatedMs);
        
        rCtx.strokeText(txt, fSize * 0.5, resultCanvas.height - fSize * 0.5);
        rCtx.fillStyle = '#f4f1ea';
        rCtx.fillText(txt, fSize * 0.5, resultCanvas.height - fSize * 0.5);
      }
    }
  }

  flashZeroBtn.addEventListener('click', () => {
    resultVideo.pause();

    videoTimelineMap = [{ videoStart: currentVideoMs, raceStart: 0 }];
    videoTimelineMap.unshift({ videoStart: 0, raceStart: -currentVideoMs });
    currentSyncLabelString = "0.00 (Flash Checked)";
    isVideoSynced = true; // Unlock the timeline calculations

    if (finishersList.length > 0) { finishersList = []; renderResultsTable(); }
    drawReviewFrame();
  });

  syncVideoBtn.addEventListener('click', () => {
    resultVideo.pause();

    if (promptValue === null) return;
    const targetRaceMs = parseClockToMs(promptValue);
    videoTimelineMap = [{ videoStart: 0, raceStart: targetRaceMs - (resultVideo.currentTime * 1000) }];
    currentSyncLabelString = promptValue.trim();
    isVideoSynced = true; // Unlock the timeline calculations
    drawReviewFrame();
  });

  function startRecording() {
    const combined = new MediaStream([...canvas.captureStream(60).getVideoTracks(), ...(audioTrack?[audioTrack]:(cameraStream?cameraStream.getAudioTracks():[]))]);
    const recOpts = { videoBitsPerSecond: 8_000_000 };
    if (REC_FORMAT.mime) recOpts.mimeType = REC_FORMAT.mime;
    recorder = new MediaRecorder(combined, recOpts);
    recordedChunks = [];
    recorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    recorder.onstop = () => {
      const b = new Blob(recordedChunks, { type: REC_FORMAT.blobType });
      const process = (blob) => {
        if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
        lastBlobUrl = URL.createObjectURL(blob); 
        resultVideo.src = lastBlobUrl;
        
        resultVideo.onloadedmetadata = () => {
          resultVideo.currentTime = 0;
          resultCanvas.width = resultVideo.videoWidth || 1280;
          resultCanvas.height = resultVideo.videoHeight || 720;
          inlinePlayPauseBtn.textContent = 'PLAY';
          isImportedVideoMode = false; 
          isVideoSynced = true; // Camera recordings are always auto-synced
          finishersList = []; 
          renderResultsTable();
          burnSmoothBtn.style.display = 'none'; downloadBtn.style.display = 'inline-block'; syncVideoBtn.style.display = 'none';
          drawLoopActive = false; // pause live canvas while review is open
          resultOverlay.classList.add('show');
          drawReviewFrame();
        };
        resultVideo.load();
      };
      // The duration fixer only understands WebM container data — skip it
      // entirely for MP4 recordings (iOS), whose duration is already correct.
      if (REC_FORMAT.ext === 'webm' && window.ysFixWebmDuration && lastRecordingDurationMs > 0) {

    };

    videoTimelineMap = [{ videoStart: 0, raceStart: currentClockMs() }];
    updateRecUI();
  }

  recMainBtn.addEventListener('click', () => {
    if (recordingState === 'idle') { haptic('heavy'); startRecording(); }
    else if (recordingState === 'recording') { haptic('medium'); recorder.pause(); recordingActiveMs += performance.now()-activeSegmentStart; recordingState = 'paused'; updateRecUI(); }
    else if (recordingState === 'paused') { haptic('medium'); recorder.resume(); activeSegmentStart = performance.now(); recordingState = 'recording'; videoTimelineMap.push({ videoStart: recordingActiveMs, raceStart: currentClockMs() }); updateRecUI(); }
  });
  finishBtn.addEventListener('click', () => { haptic('heavy'); lastRecordingDurationMs = currentActiveDurationMs(); recorder.stop(); recordingState = 'idle'; updateRecUI(); });

  function updateRecUI() {

    recDot.className = recordingState==='recording'?'blink':'';
    recLabel.textContent = recordingState==='paused'?'PAUSED':'REC';
  }

  let FRAME_STEP_SEC=1/60;
  function step(d) { 
    resultVideo.pause();

  const scrubIndicator = document.getElementById('scrubIndicator');

    scrubIndicator.textContent = text;
    scrubIndicator.classList.add('show');

    scrubIndicatorTimer = setTimeout(() => scrubIndicator.classList.remove('show'), 800);
  }

  // Review canvas zoom state
  let reviewZoom = 1;
  let reviewPanX = 0;
  let reviewPanY = 0;

  function applyReviewTransform() {
    resultCanvas.style.transform = `scale(${reviewZoom}) translate(${reviewPanX}px, ${reviewPanY}px)`;
    resultCanvas.style.transformOrigin = 'center center';
  }

  function resetReviewZoom() {
    reviewZoom = 1; reviewPanX = 0; reviewPanY = 0;
    applyReviewTransform();
  }

  // Double-tap to reset zoom
  let lastTap = 0;
  resultDisplayContainer.addEventListener('touchend', e => {
    const now = Date.now();
    if (now - lastTap < 300 && e.touches.length === 0) {
      if (reviewZoom > 1) { resetReviewZoom(); return; }
    }
    lastTap = now;
    if (!sM && e.changedTouches.length === 1 && !pinchInProgress) toggleVideoPlayback();
  });

  // Velocity-aware scrub + pinch zoom
  let sX=0, sT=0, sM=false, sLastX=0, sLastY=0, sLastT=0, sVel=0, sLastFrame=-1;
  let pinchInProgress = false;
  let pinchStartDist2 = 0, pinchStartZoom = 1;
  let pinchMidX = 0, pinchMidY = 0;
  const FPS_STEP = 1/60;

  resultDisplayContainer.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      pinchInProgress = true;
      pinchStartDist2 = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      pinchStartZoom = reviewZoom;
      pinchMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      pinchMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      return;
    }
    pinchInProgress = false;
    sX = e.touches[0].clientX;
    sLastX = sX;
    sLastY = e.touches[0].clientY;
    sT = resultVideo.currentTime;
    sLastT = performance.now();
    sM = false; sVel = 0; sLastFrame = -1;
  }, { passive: true });

  resultDisplayContainer.addEventListener('touchmove', e => {
    e.preventDefault();

    if (e.touches.length === 2) {
      pinchInProgress = true;
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const newZoom = Math.min(8, Math.max(1, pinchStartZoom * (dist / pinchStartDist2)));

      // Zoom toward the pinch midpoint
      const rect = resultCanvas.getBoundingClientRect();
      const midX = ((e.touches[0].clientX + e.touches[1].clientX) / 2 - rect.left) / rect.width - 0.5;
      const midY = ((e.touches[0].clientY + e.touches[1].clientY) / 2 - rect.top) / rect.height - 0.5;
      const zoomRatio = newZoom / reviewZoom;
      reviewPanX = midX * rect.width * (1 - zoomRatio) / newZoom + reviewPanX * zoomRatio;
      reviewPanY = midY * rect.height * (1 - zoomRatio) / newZoom + reviewPanY * zoomRatio;

      reviewZoom = newZoom;
      applyReviewTransform();
      showScrubIndicator(reviewZoom.toFixed(1) + 'x');
      return;
    }

    if (pinchInProgress) return;

    // If zoomed in, single finger pans
    if (reviewZoom > 1) {
      reviewPanX += (e.touches[0].clientX - sLastX) / reviewZoom;
      reviewPanY += (e.touches[0].clientY - sLastY) / reviewZoom;
      sLastX = e.touches[0].clientX;
      sLastY = e.touches[0].clientY;
      applyReviewTransform();
      return;
    }

    const x = e.touches[0].clientX;
    const dx = x - sX;
    const now = performance.now();
    const dt = now - sLastT || 16;

    const instVel = (x - sLastX) / dt;
    sVel = sVel * 0.6 + instVel * 0.4;
    sLastX = x; sLastT = now;

    if (Math.abs(dx) > 6) sM = true;
    if (!sM) return;

    resultVideo.pause();

    const speed = Math.abs(sVel);
    let seekDelta;
    if (speed < 0.15) {
      const targetFrame = Math.round((sT + dx * FPS_STEP * 0.5) / FPS_STEP);
      if (targetFrame !== sLastFrame) {
        seekDelta = targetFrame * FPS_STEP - resultVideo.currentTime;
        sLastFrame = targetFrame;
      } else { return; }
    } else if (speed < 0.5) {
      seekDelta = dx * 0.008;
    } else if (speed < 1.5) {
      seekDelta = dx * 0.03;
    } else {
      seekDelta = dx * 0.08;
    }

    const newTime = Math.max(0, Math.min(resultVideo.duration, sT + (seekDelta !== undefined ? seekDelta : dx * 0.012)));
    resultVideo.currentTime = newTime;

    const frameDelta = Math.round((newTime - sT) / FPS_STEP);
    let label;
    if (Math.abs(frameDelta) <= 2 && speed < 0.5) {
      label = (frameDelta >= 0 ? '+' : '') + frameDelta + (Math.abs(frameDelta) === 1 ? ' frame' : ' frames');
    } else {
      const secDelta = newTime - sT;
      label = (secDelta >= 0 ? '+' : '') + secDelta.toFixed(2) + 's';
    }
    showScrubIndicator(label);
  }, { passive: false });

  resultDisplayContainer.addEventListener('click', (e) => { if(!sM && e.target === resultCanvas) { toggleVideoPlayback(); } });
  inlinePlayPauseBtn.addEventListener('click', toggleVideoPlayback);

  function toggleVideoPlayback() {
    if (resultVideo.paused) {
      resultVideo.play().catch((err) => { console.error("Playback failed: ", err); });
    } else {
      resultVideo.pause();
    }
  }

  let uploadedVideoName = '';

  function markCurrentFinisher() {
    const calculatedMs = getCalculatedRaceTimeMs();
    finishersList.push({ time: formatClock(Math.max(0, calculatedMs)), note: '' });
    renderResultsTable();
    saveClock();
  }

  function renderResultsTable() {
    resultsBody.innerHTML = '';
    finishersList.forEach((entry, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${i + 1}</td>
        <td style="font-weight:bold;white-space:nowrap;">${entry.time}</td>
        <td><input type="text" value="${entry.note || ''}" placeholder="add note…"
          style="width:100%;background:transparent;border:none;border-bottom:1px solid #444;
          color:var(--paper);font-family:var(--mono);font-size:12px;padding:2px 4px;outline:none;"
        /></td>
        <td style="text-align:center;"><button class="deleteRowBtn">&times;</button></td>`;
      tr.querySelector('input').addEventListener('change', e => {
        finishersList[i].note = e.target.value;
        saveClock();
      });
      tr.querySelector('.deleteRowBtn').onclick = () => {
        finishersList.splice(i, 1);
        renderResultsTable();
        saveClock();
      };
      resultsBody.appendChild(tr);
    });
  }

  takeSplitBtn.onclick = markCurrentFinisher;
  window.onkeydown = (e) => { if (resultOverlay.classList.contains('show') && e.code === 'Space') { e.preventDefault(); markCurrentFinisher(); } };

  exportCsvBtn.onclick = () => {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    const defaultName = `results-${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}`;
    let desiredName = prompt("Enter a name for your CSV file:", defaultName);
    if (desiredName === null) return;
    desiredName = desiredName.trim() || defaultName;
    const cleanFilename = desiredName.replace(/[^a-z0-9_\-\(\)]/gi, '_');
    const exportedAt = now.toLocaleDateString() + ' ' + now.toLocaleTimeString();
    let csv = `Exported,${exportedAt}\n`;
    if (uploadedVideoName) csv += `Video,${uploadedVideoName}\n`;
    csv += '\nPlace,Time,Notes\n';
    finishersList.forEach((entry, i) => csv += `${i + 1},${entry.time},"${(entry.note||'').replace(/"/g,'""')}"\n`);
    const link = document.createElement('a');
    link.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
    link.download = cleanFilename.endsWith('.csv') ? cleanFilename : `${cleanFilename}.csv`;
    link.click();
  };

  const burnSmoothBtn = document.getElementById('burnSmoothBtn');

  function drawClockOnCanvas() {
    const fSize = Math.round(resultCanvas.width * 0.045);
    rCtx.font = `700 ${fSize}px ui-monospace, monospace`;
    rCtx.lineJoin = 'round'; rCtx.lineWidth = fSize * 0.15; rCtx.strokeStyle = 'rgba(0,0,0,0.8)';
    const txt = formatClock(Math.max(0, getCalculatedRaceTimeMs()));
    rCtx.strokeText(txt, fSize * 0.5, resultCanvas.height - fSize * 0.5);
    rCtx.fillStyle = '#f4f1ea';
    rCtx.fillText(txt, fSize * 0.5, resultCanvas.height - fSize * 0.5);
  }

  function getBurnFps() {
    return new Promise(resolve => {
      let burnFps = 60;
      if (cameraStream) {
        const vt = cameraStream.getVideoTracks()[0];
        if (vt) burnFps = vt.getSettings().frameRate || 60;
      }
      if (!('requestVideoFrameCallback' in HTMLVideoElement.prototype)) return resolve(burnFps);
      let t1 = null;
      const sample = (now, meta) => {
        if (t1 === null) { t1 = meta.mediaTime; resultVideo.requestVideoFrameCallback(sample); }
        else {
          const delta = meta.mediaTime - t1;
          resolve(delta > 0 ? Math.max(24, Math.min(120, Math.round(1 / delta))) : burnFps);
        }
      };
      resultVideo.currentTime = 0;
      resultVideo.requestVideoFrameCallback(sample);
    });
  }

  function startBurnRecorder(fps) {
    const pixels = resultCanvas.width * resultCanvas.height;
    const targetBitrate = Math.min(50_000_000, Math.max(8_000_000, Math.round(pixels * 0.1 * fps)));
    // Include audio from the uploaded video if available
    const videoTracks = resultCanvas.captureStream(fps).getVideoTracks();
    const audioTracks = resultVideo.captureStream ? resultVideo.captureStream().getAudioTracks() : [];
    const burnStream = new MediaStream([...videoTracks, ...audioTracks]);
    const burnOpts = { videoBitsPerSecond: targetBitrate };
    if (REC_FORMAT.mime) burnOpts.mimeType = REC_FORMAT.mime;
    const burnRecorder = new MediaRecorder(burnStream, burnOpts);
    const chunks = [];
    burnRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    return { burnRecorder, chunks };
  }

  function finishBurn(chunks) {
    const finalBlob = new Blob(chunks, { type: REC_FORMAT.blobType });
    const filename = `race-${Date.now()}.${REC_FORMAT.ext}`;

    // Try Web Share API first (Android/iOS native share sheet)
    if (navigator.canShare && navigator.canShare({ files: [new File([finalBlob], filename, { type: REC_FORMAT.blobType })] })) {
      const file = new File([finalBlob], filename, { type: REC_FORMAT.blobType });
      navigator.share({ files: [file], title: 'Race Video' }).catch(() => {
        // User cancelled or share failed — fall back to download
        triggerDownload(finalBlob, filename);
      });
    } else {
      triggerDownload(finalBlob, filename);
    }

    burnSmoothBtn.textContent = 'Share Video';
    burnSmoothBtn.disabled = false;
  }

  function triggerDownload(blob, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
  }

  burnSmoothBtn.onclick = () => {
    burnSmoothBtn.textContent = 'Saving…';
    burnSmoothBtn.disabled = true;

    // Seek and play immediately while we still have the user gesture context
    resultVideo.currentTime = 0;
    resultVideo.playbackRate = 1;
    const playPromise = resultVideo.play();

    getBurnFps().then(fps => {
      const { burnRecorder, chunks } = startBurnRecorder(fps);
      burnRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      burnRecorder.onstop = () => finishBurn(chunks);

      let smoothLoopId = null;
      let started = false;

      const smoothLoop = () => {
        if (resultVideo.ended) {
          cancelAnimationFrame(smoothLoopId);
          burnRecorder.stop();
          return;
        }
        rCtx.drawImage(resultVideo, 0, 0, resultCanvas.width, resultCanvas.height);
        drawClockOnCanvas();
        smoothLoopId = requestAnimationFrame(smoothLoop);
      };

      // Wait for play to actually start before kicking off the recorder
      const startWhenPlaying = () => {
        burnRecorder.start();
        smoothLoopId = requestAnimationFrame(smoothLoop);
      };

      if (playPromise) {
        playPromise.then(startWhenPlaying).catch(err => {
          console.error('Playback failed:', err);
          burnSmoothBtn.textContent = 'Save Video';
          burnSmoothBtn.disabled = false;
        });
      } else {
        startWhenPlaying();
      }
    });
  };

  discardBtn.onclick = () => {
    if(confirm('Exit review mode? Unsaved selections will be lost.')) {
      resultOverlay.classList.remove('show');
      resultVideo.pause();
      resultVideo.src = '';
      finishersList=[]; videoTimelineMap=[];
      isImportedVideoMode = false; isVideoSynced = false;
      resetReviewZoom();
      saveClock();
      if (!cameraStream) {
        // Camera was killed by external video upload — restart it
        drawLoopActive = true;
        startCamera();
      } else {
        // Camera still running but draw loop was paused — resume it
        drawLoopActive = true;
        requestAnimationFrame(drawLoop);
      }
    }
  };
  downloadBtn.onclick = () => { const a=document.createElement('a'); a.href=lastBlobUrl; a.download=`race-${Date.now()}.${REC_FORMAT.ext}`; a.click(); };
  // PWA service worker — enables install + full offline use. This app has
  // no data dependencies (camera only), so once cached it works with zero
  // signal — which is exactly the situation at most starting lines.
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
</script>
</body>
</html>
